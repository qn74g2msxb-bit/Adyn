<style>

:root{–bg:#0B0F1A;–c1:#1a1a2e;–c2:#16213e;–c3:#0f3460;–t1:#F1F5F9;–t2:#CBD5E1;–tm:#64748B;–td:#475569;–tf:#334155;–bs:rgba(255,255,255,0.04);–bl:rgba(255,255,255,0.06);–ac:#4ECDC4;–ad:#44A08D;–fd:‘Playfair Display’,Georgia,serif;–fb:‘Source Sans 3’,-apple-system,sans-serif;–fm:‘JetBrains Mono’,‘SF Mono’,monospace;–sb:env(safe-area-inset-bottom,0px)}

.hst{display:flex;align-items:center;gap:12px}.hst .sb{text-align:center}.sv{font-family:var(–fm);font-size:14px;font-weight:700}.sv.f{color:#FFD93D}.sv.x{background:linear-gradient(135deg,#FFD93D,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sl{font-family:var(–fm);font-size:8px;color:var(–tm);letter-spacing:.8px}.sd{width:1px;height:22px;background:#1E293B}
.sp{padding:0 20px 6px;display:flex;align-items:center;gap:10px;animation:fid .45s ease}.spt{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}.spf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(–ac),#A78BFA);transition:width .4s cubic-bezier(.4,0,.2,1)}.spl{font-family:var(–fm);font-size:10px;color:var(–tm);white-space:nowrap}
.cp{padding:2px 20px 8px;display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;animation:fid .5s ease}.cp::-webkit-scrollbar{display:none}.cp button{padding:5px 12px;border-radius:18px;white-space:nowrap;font-family:var(–fm);font-size:11px;font-weight:600;border:1px solid var(–bl);color:var(–tm);transition:all .2s;display:flex;align-items:center;gap:5px;flex-shrink:0}.cp button.a{color:var(–t1);background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18)}

.cg{position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;pointer-events:none;opacity:.12}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;z-index:1}.cc{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:18px}.ccl{font-family:var(–fm);font-size:10px;font-weight:600;letter-spacing:.5px}.cm{display:flex;align-items:center;gap:6px}.ct{font-family:var(–fm);font-size:11px;color:var(–tm)}.cx{font-family:var(–fm);font-size:11px;font-weight:700;background:linear-gradient(135deg,#FFD93D,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cti{font-family:var(–fd);font-size:23px;font-weight:700;color:var(–t1);line-height:1.2;margin-bottom:5px;position:relative;z-index:1}
.cs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;font-size:13px}.cs em{color:#94A3B8;font-style:italic}.cs .d{color:var(–td)}.cs .au{color:var(–tm)}.cs .yr{font-family:var(–fm);font-size:11px;color:var(–td)}

.ci{border-radius:14px;padding:13px 15px;margin:14px 0;position:relative;z-index:1}.cil{font-family:var(–fm);font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px;text-transform:uppercase}.cit{font-size:13px;line-height:1.5;color:#E2E8F0}
.cac{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;padding-top:4px}.cvs{font-family:var(–fm);font-size:12px;color:var(–tm);display:flex;align-items:center;gap:4px}.bsv{padding:7px 16px;border-radius:10px;font-family:var(–fm);font-size:12px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94A3B8}
.swl{position:absolute;top:18px;padding:5px 14px;border-radius:7px;font-family:var(–fm);font-size:12px;font-weight:700;letter-spacing:1px;z-index:10;pointer-events:none;opacity:0;transition:opacity .15s}.swl.s{left:18px;border:2px solid #34D399;color:#34D399}.swl.k{right:18px;border:2px solid #FF6B6B;color:#FF6B6B}.swl.v{opacity:1}
.cmp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;animation:fi .5s ease}.cmp .e{font-size:48px;animation:pu 2s infinite}.cmp h2{font-family:var(–fd);font-size:22px;font-weight:700;text-align:center}.cmp p{font-size:14px;color:var(–tm);text-align:center;max-width:260px;line-height:1.5}.brst{margin-top:10px;padding:12px 28px;border-radius:14px;background:linear-gradient(135deg,var(–ac),var(–ad));color:var(–bg);font-family:var(–fm);font-weight:700;font-size:13px}.brst:active{transform:scale(.96)}
.stv{flex:1;padding:0 16px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .4s ease}.ste{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}.sgl{font-family:var(–fm);font-size:11px;letter-spacing:1px;color:var(–tm);padding:10px 0 6px;display:flex;align-items:center;gap:6px}.sc{border-radius:14px;padding:16px 14px;margin-bottom:10px;background:linear-gradient(165deg,var(–c1),var(–c2))}.sch{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:11px}.scc{font-family:var(–fm);font-size:10px;font-weight:600}.sca{color:var(–td)}.sct{font-family:var(–fd);font-size:15px;font-weight:700;color:#E2E8F0;margin-bottom:5px}.scx{font-size:13px;color:#94A3B8;line-height:1.5}
.pv{flex:1;padding:16px 20px 8px;overflow-y:auto;animation:fi .4s ease}.ph{border-radius:20px;padding:22px;text-align:center;background:linear-gradient(135deg,var(–c1),var(–c2));border:1px solid var(–bs);margin-bottom:16px}.ph .e{font-size:38px;margin-bottom:10px}.ph h2{font-family:var(–fd);font-size:20px;font-weight:700}.ph .sub{font-size:13px;color:var(–tm);margin-bottom:14px}.xpt{background:rgba(255,255,255,.05);border-radius:6px;height:7px;overflow:hidden}.xpf{height:100%;border-radius:6px;background:linear-gradient(90deg,#4ECDC4,#A78BFA);transition:width .5s ease}.xpl{font-family:var(–fm);font-size:11px;color:var(–td);margin-top:6px}.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sgc{border-radius:14px;padding:16px 14px;background:linear-gradient(165deg,var(–c1),var(–c2));border:1px solid var(–bs)}.sgc .i{font-size:20px;margin-bottom:6px}.sgc .v{font-family:var(–fd);font-size:20px;font-weight:700}.sgc .l{font-family:var(–fm);font-size:9px;color:var(–tm);letter-spacing:.5px;margin-top:2px}
.bn{padding:8px 32px calc(12px + var(–sb));display:flex;justify-content:space-around;border-top:1px solid var(–bs);background:var(–bg)}.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 14px;transition:all .2s}.nb .i{font-size:18px;color:var(–tf);transition:color .2s}.nb .l{font-family:var(–fm);font-size:9px;letter-spacing:.8px;color:var(–td);font-weight:500;transition:color .2s}.nb.a .i{color:var(–ac)}.nb.a .l{color:var(–ac);font-weight:700}
.sh{text-align:center;padding:2px 0 4px;font-family:var(–fm);font-size:10px;color:var(–tf);letter-spacing:.5px;animation:fi 1.2s ease}
.dtv{flex:1;padding:16px 20px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .4s ease}
.dtv .back{display:flex;align-items:center;gap:6px;font-family:var(–fm);font-size:12px;color:var(–ac);margin-bottom:14px;padding:6px 0;background:none;border:none;cursor:pointer}
.dtv h1{font-family:var(–fd);font-size:26px;font-weight:700;line-height:1.2;margin-bottom:8px}
.dtv .meta{font-size:13px;color:#94A3B8;margin-bottom:20px}
.dtv .sect-label{font-family:var(–fm);font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}
.dtv .body-text{font-size:16px;line-height:1.75;color:var(–t2);margin-bottom:24px}
.dtv .insight-box{border-radius:14px;padding:14px 16px;margin-bottom:24px}
.dtv .deep-box{border-radius:14px;padding:16px 18px;margin-bottom:24px;background:linear-gradient(165deg,var(–c1),var(–c2));border:1px solid var(–bl)}
.vice-btn{display:block;margin:4px auto 2px;background:none;border:1px solid rgba(78,205,196,0.3);border-radius:10px;padding:6px 18px;color:var(–ac);font-family:var(–fm);font-size:11px;font-weight:600;cursor:pointer}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fid{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes exl{to{transform:translateX(-120%) rotate(-12deg);opacity:0}}
@keyframes exr{to{transform:translateX(120%) rotate(12deg);opacity:0}}

<script>
var DL=10;
var CATS=[
{id:"psychologie",label:"Psychologie",icon:"\u{1F9E0}",color:"#FF6B6B"},
{id:"produktivita",label:"Produktivita",icon:"\u26A1",color:"#4ECDC4"},
{id:"finance",label:"Finance",icon:"\u{1F4B0}",color:"#FFD93D"},
{id:"filosofie",label:"Filosofie",icon:"\u{1F52E}",color:"#A78BFA"},
{id:"komunikace",label:"Komunikace",icon:"\u{1F4AC}",color:"#F472B6"},
{id:"zdravi",label:"Zdrav\u00ED",icon:"\u{1F33F}",color:"#34D399"}
];
var CD=[{"id": "p1", "cat": "psychologie", "src": "My\u0161len\u00ed, rychl\u00e9 a pomal\u00e9", "au": "Daniel Kahneman", "yr": 2011, "ti": "Dva syst\u00e9my my\u0161len\u00ed", "bo": "Kahneman rozli\u0161uje dva zp\u016fsoby zpracov\u00e1n\u00ed informac\u00ed. Syst\u00e9m 1 je rychl\u00fd a automatick\u00fd \u2014 rozpozn\u00e1te v\u00fdraz obli\u010deje, ani\u017e byste p\u0159em\u00fd\u0161leli. Syst\u00e9m 2 vy\u017eaduje soust\u0159ed\u011bn\u00ed a \u00fasil\u00ed, t\u0159eba p\u0159i po\u010d\u00edt\u00e1n\u00ed 17 \u00d7 24. V\u011bt\u0161inu rozhodov\u00e1n\u00ed \u0159\u00edd\u00ed Syst\u00e9m 1, co\u017e vede k systematick\u00fdm chyb\u00e1m v \u00fasudku. Kdy\u017e v\u00e1s n\u011bkdo po\u017e\u00e1d\u00e1 o odhad, Syst\u00e9m 1 automaticky hled\u00e1 jednoduchou odpov\u011b\u010f a ignoruje slo\u017eitost.", "in": "Kahneman\u016fv v\u00fdzkum uk\u00e1zal, \u017ee i zku\u0161en\u00ed odborn\u00edci se p\u0159i intuitivn\u00edch rozhodnut\u00edch \u010dasto m\u00fdl\u00ed. U d\u016fle\u017eit\u00fdch rozhodnut\u00ed pom\u00e1h\u00e1 v\u011bdom\u011b zpomalit a zapojit analytick\u00e9 my\u0161len\u00ed.", "dt": "Kahneman str\u00e1vil des\u00edtky let v\u00fdzkumem s Amosem Tverskym. Spole\u010dn\u011b vytvo\u0159ili Prospect Theory, za kterou Kahneman dostal Nobelovu cenu v roce 2002. Syst\u00e9m 1 zpracov\u00e1v\u00e1 informace paraleln\u011b a bez n\u00e1mahy \u2014 zvl\u00e1dne rozpoznat emoce, \u0159\u00eddit auto v pr\u00e1zdn\u00e9 ulici nebo dokon\u010dit fr\u00e1zi. Syst\u00e9m 2 je s\u00e9riov\u00fd a n\u00e1ro\u010dn\u00fd \u2014 aktivuje se p\u0159i slo\u017eit\u00e9m po\u010d\u00edt\u00e1n\u00ed, vypl\u0148ov\u00e1n\u00ed da\u0148ov\u00e9ho p\u0159izn\u00e1n\u00ed nebo parkov\u00e1n\u00ed v \u00fazk\u00e9m m\u00edst\u011b. Probl\u00e9m nast\u00e1v\u00e1, kdy\u017e Syst\u00e9m 1 odpov\u00edd\u00e1 na ot\u00e1zky, kter\u00e9 by m\u011bl \u0159e\u0161it Syst\u00e9m 2. Nap\u0159\u00edklad p\u0159i investov\u00e1n\u00ed Syst\u00e9m 1 reaguje na emoce m\u00edsto racion\u00e1ln\u00ed anal\u00fdzy. Kahneman identifikoval des\u00edtky kognitivn\u00edch zkreslen\u00ed \u2014 systematick\u00fdch chyb, kter\u00e9 d\u011bl\u00e1me p\u0159edv\u00eddateln\u011b a opakovan\u011b.", "rt": "45s", "sv": 2341, "xp": 15}, {"id": "p2", "cat": "psychologie", "src": "Journal of Personality and Social Psychology", "au": "Kruger & Dunning", "yr": 1999, "ti": "Dunning-Kruger\u016fv efekt", "bo": "Lid\u00e9 s nejmen\u0161\u00ed \u00farovn\u00ed znalost\u00ed si paradoxn\u011b nejv\u00edc v\u011b\u0159\u00ed. Nekompetentn\u00ed lid\u00e9 nejen d\u011blaj\u00ed \u0161patn\u00e1 rozhodnut\u00ed, ale nav\u00edc jim chyb\u00ed schopnost rozpoznat vlastn\u00ed chyby. Naopak skute\u010dn\u00ed experti maj\u00ed tendenci sv\u00e9 schopnosti podce\u0148ovat, proto\u017ee p\u0159edpokl\u00e1daj\u00ed, \u017ee co je snadn\u00e9 pro n\u011b, je snadn\u00e9 pro v\u0161echny.", "in": "\u010c\u00edm v\u00edc toho v\u00edte, t\u00edm v\u00edc si uv\u011bdomujete, co nev\u00edte. P\u0159i naj\u00edm\u00e1n\u00ed lid\u00ed nemus\u00ed b\u00fdt ti nejhlasit\u011bj\u0161\u00ed kandid\u00e1ti ti nejkompetentn\u011bj\u0161\u00ed.", "dt": "Kruger a Dunning provedli \u010dty\u0159i studie testuj\u00edc\u00ed logick\u00e9 my\u0161len\u00ed, gramatiku a humor. \u00da\u010dastn\u00edci v doln\u00edm kvartilu odhadovali sv\u016fj v\u00fdkon na 62. percentil \u2014 dramatick\u00e9 nadhodnocen\u00ed. Efekt m\u00e1 dv\u011b \u010d\u00e1sti: nekompetentn\u00ed p\u0159ece\u0148uj\u00ed sebe a z\u00e1rove\u0148 nedok\u00e1\u017e\u00ed rozpoznat kompetenci u druh\u00fdch. Kdy\u017e byli podrobeni tr\u00e9ninku, jejich sebed\u016fv\u011bra paradoxn\u011b klesla \u2014 teprve pak pochopili, co nev\u011bd\u011bli.", "rt": "40s", "sv": 3102, "xp": 15}, {"id": "p3", "cat": "psychologie", "src": "Judgment under Uncertainty", "au": "Tversky & Kahneman", "yr": 1974, "ti": "Efekt kotven\u00ed", "bo": "Prvn\u00ed \u010d\u00edslo, kter\u00e9 usly\u0161\u00edte, ovlivn\u00ed v\u00e1\u0161 odhad \u2014 i kdy\u017e s t\u00e9matem v\u016fbec nesouvis\u00ed. \u00da\u010dastn\u00edci studie to\u010dili kolem \u0161t\u011bst\u00ed (\u010d\u00edslo 10 nebo 65) a pot\u00e9 odhadovali procento africk\u00fdch zem\u00ed v OSN. Skupina s \u010d\u00edslem 65 odhadovala v\u00fdrazn\u011b v\u00fd\u0161. Kotven\u00ed funguje, i kdy\u017e v\u00edte, \u017ee \u010d\u00edslo je n\u00e1hodn\u00e9.", "in": "V obchod\u011b p\u0159e\u0161krtnut\u00e1 cena 2999 K\u010d a nov\u00e1 999 K\u010d vyu\u017e\u00edv\u00e1 p\u0159esn\u011b tento mechanismus. P\u016fvodn\u00ed cena je kotva, kter\u00e1 d\u011bl\u00e1 slevu obrovskou.", "dt": "Kotven\u00ed je jedn\u00edm z nejrobustn\u011bj\u0161\u00edch kognitivn\u00edch zkreslen\u00ed. Soudci dostali n\u00e1hodn\u00e9 \u010d\u00edslo a jejich rozsudky s n\u00edm korelovaly. Realitn\u00ed makl\u00e9\u0159i odhadovali cenu domu jinak podle toho, jakou cenou experiment za\u010dal. Obrana: uv\u011bdomte si kotvu a v\u011bdom\u011b zva\u017ete opa\u010dn\u00fd extr\u00e9m. P\u0159i vyjedn\u00e1v\u00e1n\u00ed: kdo stanov\u00ed prvn\u00ed \u010d\u00edslo, obvykle vyhraje.", "rt": "40s", "sv": 1987, "xp": 15}, {"id": "p4", "cat": "psychologie", "src": "A Theory of Cognitive Dissonance", "au": "Leon Festinger", "yr": 1957, "ti": "Kognitivn\u00ed disonance", "bo": "Kdy\u017e va\u0161e p\u0159esv\u011bd\u010den\u00ed a jedn\u00e1n\u00ed nejsou v souladu, vznik\u00e1 nep\u0159\u00edjemn\u00e9 vnit\u0159n\u00ed nap\u011bt\u00ed. Festinger studoval sektu v\u011b\u0159\u00edc\u00ed v konec sv\u011bta. Kdy\u017e se proroctv\u00ed nesplnilo, \u010dlenov\u00e9 svou v\u00edru paradoxn\u011b pos\u00edlili, aby zm\u00edrnili rozpor. Mozek preferuje konzistenci a je ochoten p\u0159ekroutit realitu, aby ji dos\u00e1hl.", "in": "Disonanci \u0159e\u0161\u00edme t\u0159emi zp\u016fsoby: zm\u011bn\u00edme chov\u00e1n\u00ed, zm\u011bn\u00edme p\u0159esv\u011bd\u010den\u00ed, nebo si najdeme v\u00fdmluvu. Nap\u0159\u00edklad ku\u0159\u00e1k v\u00ed, \u017ee kou\u0159en\u00ed \u0161kod\u00ed, ale p\u0159esv\u011bd\u010d\u00ed se, \u017ee stres je hor\u0161\u00ed ne\u017e cigarety.", "dt": "Festinger se infiltroval do sekty Dorothy Martinov\u00e9, kter\u00e1 p\u0159edpov\u011bd\u011bla z\u00e1plavu. Kdy\u017e se proroctv\u00ed nesplnilo, \u010dlenov\u00e9 za\u010dali je\u0161t\u011b aktivn\u011bji verbovat. \u010c\u00edm v\u00edc do p\u0159esv\u011bd\u010den\u00ed investujete, t\u00edm t\u011b\u017e\u0161\u00ed je ho opustit. Kupte si drah\u00e9 auto a za\u010dnete aktivn\u011b vyhled\u00e1vat pozitivn\u00ed recenze, abyste ospravedlnili n\u00e1kup.", "rt": "40s", "sv": 2456, "xp": 15}, {"id": "p5", "cat": "psychologie", "src": "Experiment\u00e1ln\u00ed studie", "au": "Robert Zajonc", "yr": 1968, "ti": "Efekt pouh\u00e9ho vystaven\u00ed", "bo": "\u010c\u00edm \u010dast\u011bji n\u011bco v\u00edd\u00e1te, t\u00edm v\u00edc se v\u00e1m to l\u00edb\u00ed \u2014 i bez v\u011bdom\u00e9ho rozpozn\u00e1n\u00ed. Zajonc ukazoval lidem \u010d\u00ednsk\u00e9 znaky r\u016fzn\u011b \u010dasto. Ti, kte\u0159\u00ed znak vid\u011bli v\u00edcekr\u00e1t, ho hodnotili pozitivn\u011bji, ani\u017e by ho um\u011bli p\u0159e\u010d\u00edst. Efekt funguje u tv\u00e1\u0159\u00ed, melodi\u00ed, zna\u010dek i abstraktn\u00edch tvar\u016f.", "in": "Proto funguje reklama opakov\u00e1n\u00edm. A proto v\u00e1m p\u00edsni\u010dky, kter\u00e9 zpo\u010d\u00e1tku nemus\u00edte, po des\u00e1t\u00e9m poslechu za\u010dnou zn\u00edt skv\u011ble.", "rt": "35s", "sv": 1654, "xp": 10}, {"id": "p6", "cat": "psychologie", "src": "Marshmallow experiment (Stanford)", "au": "Walter Mischel", "yr": 1972, "ti": "Odlo\u017een\u00e1 odm\u011bna", "bo": "D\u011btem ve v\u011bku 4 let nab\u00eddli jednu su\u0161enku hned, nebo dv\u011b za 15 minut \u010dek\u00e1n\u00ed. D\u011bti schopn\u00e9 \u010dekat m\u011bly o des\u00edtky let pozd\u011bji lep\u0161\u00ed v\u00fdsledky ve \u0161kole, ni\u017e\u0161\u00ed BMI a m\u00e9n\u011b probl\u00e9m\u016f s n\u00e1vykov\u00fdmi l\u00e1tkami. Mischel identifikoval strategie \u00fasp\u011b\u0161n\u00fdch d\u011bt\u00ed: odvracely pohled, zp\u00edvaly si nebo si p\u0159edstavovaly su\u0161enku jako obl\u00e1\u010dek.", "in": "Pozd\u011bj\u0161\u00ed studie nazna\u010dily, \u017ee roli hraje i socioekonomick\u00e9 z\u00e1zem\u00ed. D\u011bti z nestabiln\u00edho prost\u0159ed\u00ed nemaj\u00ed d\u016fvod \u010dekat, proto\u017ee se nau\u010dily, \u017ee sliby se \u010dasto nepln\u00ed.", "dt": "Mischel sledoval \u00fa\u010dastn\u00edky des\u00edtky let. D\u011bti, kter\u00e9 vydr\u017eely \u010dekat, m\u011bly o 210 bod\u016f vy\u0161\u0161\u00ed SAT sk\u00f3re. Kl\u00ed\u010dov\u00fd objev: \u00fasp\u011b\u0161n\u00e9 d\u011bti nepou\u017e\u00edvaly s\u00edlu v\u016fle, ale strategie. Sebekontrola nen\u00ed vrozen\u00e1 vlastnost, ale nau\u010diteln\u00e1 dovednost. Replika\u010dn\u00ed studie (Watts 2018) uk\u00e1zaly, \u017ee po kontrole socioekonomick\u00e9ho z\u00e1zem\u00ed prediktivn\u00ed s\u00edla klesla.", "rt": "45s", "sv": 4201, "xp": 15}, {"id": "p7", "cat": "psychologie", "src": "Soci\u00e1ln\u00ed psychologie", "au": "Edward Thorndike", "yr": 1920, "ti": "Hal\u00f3 efekt", "bo": "Prvn\u00ed dojem ovlivn\u00ed v\u0161echna dal\u0161\u00ed hodnocen\u00ed. Thorndike si v\u0161iml, \u017ee d\u016fstojn\u00edci hodnot\u00edc\u00ed voj\u00e1ky jako atraktivn\u00ed jim automaticky p\u0159isuzovali i lep\u0161\u00ed inteligenci a charakter. Hal\u00f3 efekt funguje i obr\u00e1cen\u011b: jedna negativn\u00ed vlastnost m\u016f\u017ee zast\u00ednit v\u0161echny pozitivn\u00ed. Vy\u0161\u0161\u00ed lid\u00e9 jsou vn\u00edm\u00e1ni jako kompetentn\u011bj\u0161\u00ed.", "in": "Na pohovorech rozhoduje prvn\u00edch 7 sekund. Knihu si vyb\u00edr\u00e1me podle ob\u00e1lky, i kdy\u017e \u0159\u00edk\u00e1me opak. V\u011bdom\u00ed hal\u00f3 efektu je prvn\u00ed krok k objektivn\u011bj\u0161\u00edmu hodnocen\u00ed.", "rt": "35s", "sv": 2890, "xp": 10}, {"id": "p8", "cat": "psychologie", "src": "Prospect Theory", "au": "Kahneman & Tversky", "yr": 1979, "ti": "Averze ke ztr\u00e1t\u011b", "bo": "Ztr\u00e1ta 1000 K\u010d bol\u00ed p\u0159ibli\u017en\u011b dvakr\u00e1t v\u00edc, ne\u017e kolik pot\u011b\u0161\u00ed zisk 1000 K\u010d. Lid\u00e9 d\u011blaj\u00ed iracion\u00e1ln\u00ed rozhodnut\u00ed, aby se vyhnuli ztr\u00e1t\u00e1m. Proto dr\u017e\u00edme ztr\u00e1tov\u00e9 akcie m\u00edsto prodeje a plat\u00edme poji\u0161t\u011bn\u00ed, kter\u00e9 se statisticky nevyplat\u00ed. Tversky a Kahneman uk\u00e1zali, \u017ee lid\u00e9 preferuj\u00ed jist\u00fdch 900 K\u010d p\u0159ed 90% \u0161anc\u00ed na 1000 K\u010d.", "in": "Tento objev p\u0159evr\u00e1til ekonomii a uk\u00e1zal, \u017ee lid\u00e9 jsou p\u0159edv\u00eddateln\u011b iracion\u00e1ln\u00ed. Kahneman za n\u011bj dostal Nobelovu cenu v roce 2002.", "dt": "Prospect Theory nahradila klasick\u00fd model racion\u00e1ln\u00edho agenta. Kl\u00ed\u010dov\u00e9: lid\u00e9 hodnot\u00ed zisky a ztr\u00e1ty relativn\u011b k referen\u010dn\u00edmu bodu. Jsou rizikov\u011b averzn\u00ed u zisk\u016f ale hledaj\u00edc\u00ed u ztr\u00e1t. To vysv\u011btluje, pro\u010d investo\u0159i prod\u00e1vaj\u00ed v\u00edt\u011bze brzy a dr\u017e\u00ed pora\u017een\u00e9 dlouho. Pro\u010d je snadn\u011bj\u0161\u00ed motivovat strachem. A pro\u010d freemium modely funguj\u00ed \u2014 jakmile n\u011bco m\u00e1te, nechcete to ztratit.", "rt": "45s", "sv": 3567, "xp": 20}, {"id": "p9", "cat": "psychologie", "src": "Soci\u00e1ln\u00ed psychologie", "au": "Peter Wason", "yr": 1960, "ti": "Potvrzovac\u00ed zkreslen\u00ed", "bo": "P\u0159irozen\u011b hled\u00e1me informace potvrzuj\u00edc\u00ed to, \u010demu u\u017e v\u011b\u0159\u00edme, a ignorujeme d\u016fkazy, kter\u00e9 n\u00e1m odporuj\u00ed. Wason to dok\u00e1zal testem s \u010d\u00edseln\u00fdmi \u0159adami \u2014 lid\u00e9 systematicky testovali jen hypot\u00e9zy potvrzuj\u00edc\u00ed jejich prvn\u00ed n\u00e1pad a odm\u00edtali zva\u017eovat alternativy. Skute\u010dn\u00e9 pravidlo bylo jednoduch\u00e9: t\u0159i rostouc\u00ed \u010d\u00edsla.", "in": "Na soci\u00e1ln\u00edch s\u00edt\u00edch algoritmy potvrzovac\u00ed zkreslen\u00ed n\u00e1sobn\u011b zesiluj\u00ed. Ukazuj\u00ed v\u00e1m obsah, se kter\u00fdm souhlas\u00edte, a vytv\u00e1\u0159ej\u00ed informa\u010dn\u00ed bubliny.", "rt": "40s", "sv": 2134, "xp": 15}, {"id": "p10", "cat": "psychologie", "src": "Bystander Effect Study", "au": "Darley & Latan\u00e9", "yr": 1968, "ti": "Efekt p\u0159ihl\u00ed\u017eej\u00edc\u00edho", "bo": "\u010c\u00edm v\u00edc lid\u00ed je sv\u011bdkem nehody, t\u00edm men\u0161\u00ed je pravd\u011bpodobnost, \u017ee n\u011bkdo pom\u016f\u017ee. Pokud je sv\u011bdek s\u00e1m, pom\u016f\u017ee v 85 % p\u0159\u00edpad\u016f. Ve skupin\u011b p\u011bti lid\u00ed jen ve 31 %. Ka\u017ed\u00fd \u010dek\u00e1, \u017ee zas\u00e1hne n\u011bkdo jin\u00fd. Experiment provedli po vra\u017ed\u011b Kitty Genovese v New Yorku, kde des\u00edtky sv\u011bdk\u016f nezas\u00e1hly.", "in": "Pot\u0159ebujete-li pomoc, uka\u017ete na konkr\u00e9tn\u00edho \u010dlov\u011bka: vy v modr\u00e9 bund\u011b, zavolejte z\u00e1chranku! T\u00edm rozbijete rozptyl odpov\u011bdnosti.", "rt": "40s", "sv": 3421, "xp": 15}, {"id": "p11", "cat": "psychologie", "src": "Tok: Psychologie optim\u00e1ln\u00edho pro\u017e\u00edv\u00e1n\u00ed", "au": "Mihaly Csikszentmihalyi", "yr": 1990, "ti": "Stav flow", "bo": "Flow nast\u00e1v\u00e1 p\u0159i rovnov\u00e1ze mezi obt\u00ed\u017enost\u00ed \u00fakolu a \u00farovn\u00ed dovednost\u00ed. V tomto stavu ztr\u00e1c\u00edte pojem o \u010dase a pod\u00e1v\u00e1te nejlep\u0161\u00ed v\u00fdkon. Csikszentmihalyi popsal flow na z\u00e1klad\u011b rozhovor\u016f s tis\u00edci lidmi \u2014 od chirurg\u016f po horolezce. V\u0161ichni popisovali stejn\u00e9: \u00fapln\u00e9 pohlcen\u00ed, zmizen\u00ed vnit\u0159n\u00edho kritika, jin\u00e9 vn\u00edm\u00e1n\u00ed \u010dasu.", "in": "Flow se nej\u010dast\u011bji objevuje, kdy\u017e m\u00e1 \u00fakol jasn\u00fd c\u00edl, okam\u017eitou zp\u011btnou vazbu a n\u00e1ro\u010dnost m\u00edrn\u011b p\u0159esahuje aktu\u00e1ln\u00ed schopnosti.", "rt": "40s", "sv": 1876, "xp": 15}, {"id": "p12", "cat": "psychologie", "src": "Influence", "au": "Robert Cialdini", "yr": 1984, "ti": "6 princip\u016f p\u0159esv\u011bd\u010dov\u00e1n\u00ed", "bo": "Cialdini identifikoval \u0161est univerz\u00e1ln\u00edch princip\u016f ovliv\u0148ov\u00e1n\u00ed: reciprocita (c\u00edt\u00edte povinnost oplatit), z\u00e1vazek a konzistence (\u0159\u00edk\u00e1te-li ano mal\u00fdm v\u011bcem, t\u011b\u017eko \u0159\u00edk\u00e1te ne velk\u00fdm), soci\u00e1ln\u00ed d\u016fkaz (d\u011bl\u00e1me co d\u011blaj\u00ed ostatn\u00ed), autorita (poslechneme experty), obliba (\u0159\u00edk\u00e1me ano lidem, kter\u00e9 m\u00e1me r\u00e1di) a vz\u00e1cnost (chceme to, \u010deho je m\u00e1lo).", "in": "Limitovan\u00e9 edice vyu\u017e\u00edvaj\u00ed vz\u00e1cnost. Recenze na Amazonu soci\u00e1ln\u00ed d\u016fkaz. Zku\u0161ebn\u00ed verze zdarma reciprocitu. Ka\u017ed\u00fd princip je v\u0161udyp\u0159\u00edtomn\u00fd v marketingu.", "dt": "Cialdini str\u00e1vil t\u0159i roky tajn\u011b pracuj\u00edc\u00ed v autobazarech, telefonn\u00edch centrech a charit\u00e1ch. Reciprocita: vzorky zdarma zvy\u0161uj\u00ed prodej o 500 %. Soci\u00e1ln\u00ed d\u016fkaz: hotelov\u00fd ru\u010dn\u00edk s textem 75 % host\u016f znovu pou\u017e\u00edv\u00e1 ru\u010dn\u00edky funguje l\u00edp ne\u017e apel na ekologii. Vz\u00e1cnost: pouze 3 kusy skladem zvy\u0161uje konverzi dramaticky. Cialdini pozd\u011bji p\u0159idal 7. princip: jednotu (sd\u00edlen\u00e1 identita).", "rt": "50s", "sv": 4567, "xp": 20}, {"id": "p13", "cat": "psychologie", "src": "Stumbling on Happiness", "au": "Daniel Gilbert", "yr": 2006, "ti": "\u0160patn\u011b p\u0159edpov\u00edd\u00e1me \u0161t\u011bst\u00ed", "bo": "Gilbert uk\u00e1zal, \u017ee lid\u00e9 jsou extr\u00e9mn\u011b \u0161patn\u00ed v p\u0159edpov\u00edd\u00e1n\u00ed toho, co je ud\u011bl\u00e1 \u0161\u0165astn\u00fdmi. P\u0159ece\u0148ujeme intenzitu i d\u00e9lku budouc\u00edch emoc\u00ed. Mysl\u00edme, \u017ee v\u00fdhra v loterii zm\u011bn\u00ed \u017eivot nav\u017edy (nezm\u011bn\u00ed) a \u017ee invalidita bude nesnesiteln\u00e1 (adaptujeme se). Mozek m\u00e1 psychologick\u00fd imunitn\u00ed syst\u00e9m, kter\u00fd neutralizuje negativn\u00ed ud\u00e1losti rychleji, ne\u017e \u010dek\u00e1me.", "in": "Gilbert doporu\u010duje m\u00edsto p\u0159edstavov\u00e1n\u00ed budoucnosti rad\u011bji pozorovat lidi, kte\u0159\u00ed u\u017e dan\u00fd z\u00e1\u017eitek maj\u00ed. Jejich aktu\u00e1ln\u00ed \u0161t\u011bst\u00ed je lep\u0161\u00ed prediktor ne\u017e va\u0161e fantazie.", "rt": "45s", "sv": 2345, "xp": 15}, {"id": "p14", "cat": "psychologie", "src": "V\u00fdzkum pam\u011bti", "au": "Hermann Ebbinghaus", "yr": 1885, "ti": "K\u0159ivka zapom\u00edn\u00e1n\u00ed", "bo": "Ebbinghaus jako prvn\u00ed experiment\u00e1ln\u011b zm\u011b\u0159il, jak rychle zapom\u00edn\u00e1me. Bez opakov\u00e1n\u00ed ztr\u00e1c\u00edme 50 % nau\u010den\u00e9ho b\u011bhem hodiny a 70 % b\u011bhem 24 hodin. Po t\u00fddnu z\u016fstane jen asi 25 %. Ale ka\u017ed\u00e9 opakov\u00e1n\u00ed k\u0159ivku zplo\u0161\u0165uje \u2014 po \u010dty\u0159ech opakov\u00e1n\u00edch v rostouc\u00edch intervalech si informaci pamatujete m\u011bs\u00edce a\u017e roky.", "in": "Toto je z\u00e1klad spaced repetition \u2014 metody pou\u017e\u00edvan\u00e9 aplikacemi jako Anki. Nejefektivn\u011bj\u0161\u00ed intervaly: 1 den, 3 dny, 7 dn\u016f, 21 dn\u016f.", "rt": "40s", "sv": 3890, "xp": 15}, {"id": "p15", "cat": "psychologie", "src": "Soci\u00e1ln\u00ed psychologie", "au": "Solomon Asch", "yr": 1951, "ti": "Experiment s konformitou", "bo": "Asch uk\u00e1zal skupinu lid\u00ed \u010d\u00e1ru a po\u017e\u00e1dal je, a\u0165 \u0159eknou, kter\u00e1 z dal\u0161\u00edch t\u0159\u00ed \u010dar je stejn\u011b dlouh\u00e1. Odpov\u011b\u010f byla o\u010dividn\u00e1, ale kdy\u017e v\u0161ichni (herci) volili \u0161patn\u011b, 75 % \u00fa\u010dastn\u00edk\u016f se alespo\u0148 jednou p\u0159idalo k nespr\u00e1vn\u00e9 odpov\u011bdi. Tlak skupiny je tak siln\u00fd, \u017ee zpochybn\u00edme vlastn\u00ed vn\u00edm\u00e1n\u00ed reality.", "in": "Sta\u010d\u00ed v\u0161ak jedin\u00fd spojenec. Kdy\u017e alespo\u0148 jeden \u010dlov\u011bk \u0159ekl pravdu, konformita klesla o 80 %. Jeden hlas odvahy m\u016f\u017ee zm\u011bnit dynamiku cel\u00e9 skupiny.", "rt": "40s", "sv": 2678, "xp": 15}, {"id": "p16", "cat": "psychologie", "src": "Pro\u010d zebry nemaj\u00ed v\u0159edy", "au": "Robert Sapolsky", "yr": 2004, "ti": "Chronick\u00fd stres", "bo": "Zv\u00ed\u0159e za\u017eije stres p\u0159i \u00fatoku pred\u00e1tora \u2014 a pak je bu\u010f mrtv\u00e9, nebo stres kon\u010d\u00ed. Lid\u00e9 v\u0161ak dok\u00e1\u017e\u00ed stresovat t\u00fddny dop\u0159edu kv\u016fli hypotetick\u00fdm hrozb\u00e1m. Chronick\u00fd stres zvy\u0161uje kortizol, oslabuje imunitu, ni\u010d\u00ed neurony v hipokampu a zrychluje st\u00e1rnut\u00ed. Sapolsky zjistil, \u017ee soci\u00e1ln\u00ed status v\u00fdrazn\u011b ovliv\u0148uje zdrav\u00ed.", "in": "\u010c\u00edm m\u00e9n\u011b kontroly nad sv\u00fdm \u017eivotem m\u00e1te, t\u00edm v\u00edce stresu a nemoc\u00ed. Plat\u00ed to u pavi\u00e1n\u016f i u lid\u00ed.", "rt": "45s", "sv": 1987, "xp": 15}, {"id": "p17", "cat": "psychologie", "src": "Grit", "au": "Angela Duckworth", "yr": 2016, "ti": "Hou\u017eevnatost p\u0159ed\u010d\u00ed talent", "bo": "Duckworth studovala kadety West Pointu, sout\u011b\u017e\u00edc\u00ed v pravopisu a obchodn\u00ed z\u00e1stupce. Ve v\u0161ech p\u0159\u00edpadech byla hou\u017eevnatost \u2014 kombinace vytrvalosti a dlouhodob\u00e9 v\u00e1\u0161n\u011b \u2014 lep\u0161\u00edm prediktorem \u00fasp\u011bchu ne\u017e IQ, talent nebo socioekonomick\u00e9 z\u00e1zem\u00ed. Talent bez vytrvalosti je jako nenalad\u011bn\u00fd n\u00e1stroj.", "in": "Duckworth zjistila, \u017ee grit lze rozv\u00edjet. Kl\u00ed\u010dov\u00e9 je naj\u00edt aktivitu, kter\u00e1 v\u00e1s skute\u010dn\u011b zaj\u00edm\u00e1, a pak v n\u00ed c\u00edlen\u011b tr\u00e9novat.", "rt": "40s", "sv": 3456, "xp": 15}, {"id": "p18", "cat": "psychologie", "src": "Predictably Irrational", "au": "Dan Ariely", "yr": 2008, "ti": "Efekt zdarma", "bo": "Ariely uk\u00e1zal, \u017ee slovo zdarma m\u00e1 na mozek neproporcion\u00e1ln\u00ed vliv. Nab\u00eddl bonbon za 1 cent nebo luxusn\u00ed \u010dokol\u00e1du za 15 cent\u016f. V\u011bt\u0161ina zvolila luxusn\u00ed. Kdy\u017e ob\u011b zlevnil o 1 cent (bonbon zdarma, luxusn\u00ed 14 cent\u016f), v\u011bt\u0161ina najednou zvolila bonbon. Nulov\u00e1 cena vyp\u00edn\u00e1 racion\u00e1ln\u00ed kalkulaci.", "in": "Proto funguje doprava zdarma. Lid\u00e9 rad\u011bji koup\u00ed za 50 K\u010d s dopravou zdarma ne\u017e za 40 K\u010d s dopravou 10 K\u010d, a\u010dkoliv zaplat\u00ed stejn\u011b.", "rt": "40s", "sv": 2890, "xp": 15}, {"id": "p19", "cat": "psychologie", "src": "The Paradox of Choice", "au": "Barry Schwartz", "yr": 2004, "ti": "Paradox volby", "bo": "V\u00edc mo\u017enost\u00ed nevede k v\u011bt\u0161\u00edmu \u0161t\u011bst\u00ed. V experimentu s d\u017eemy si z nab\u00eddky 6 druh\u016f koupilo 30 % lid\u00ed. Z nab\u00eddky 24 druh\u016f jen 3 %. P\u0159\u00edli\u0161 mo\u017enost\u00ed zp\u016fsobuje analytickou paral\u00fdzu, l\u00edtost nad nevybran\u00fdm a nerealistick\u00e1 o\u010dek\u00e1v\u00e1n\u00ed. V dob\u011b neomezen\u00fdch mo\u017enost\u00ed je schopnost omezit volbu konkuren\u010dn\u00ed v\u00fdhoda.", "in": "Schwartz rozli\u0161uje maximaliz\u00e9ry (hledaj\u00ed nejlep\u0161\u00ed) a satisfic\u00e9ry (hledaj\u00ed dost dobrou). Satisfic\u00e9\u0159i jsou prokazateln\u011b \u0161\u0165astn\u011bj\u0161\u00ed.", "rt": "40s", "sv": 1567, "xp": 15}, {"id": "p20", "cat": "psychologie", "src": "Thinking in Bets", "au": "Annie Duke", "yr": 2018, "ti": "My\u0161len\u00ed v pravd\u011bpodobnostech", "bo": "Duke, b\u00fdval\u00e1 pokerov\u00e1 hr\u00e1\u010dka, argumentuje, \u017ee v\u011bt\u0161ina \u017eivotn\u00edch rozhodnut\u00ed je jako poker, ne \u0161achy. V \u0161achu vid\u00edte v\u0161echny figury. V pokeru rozhodujete s ne\u00fapln\u00fdmi informacemi. \u0160patn\u00fd v\u00fdsledek neznamen\u00e1 \u0161patn\u00e9 rozhodnut\u00ed. Kl\u00ed\u010dem je odd\u011blit kvalitu rozhodnut\u00ed od kvality v\u00fdsledku.", "in": "Duke doporu\u010duje p\u0159ed ka\u017ed\u00fdm rozhodnut\u00edm odhadnout pravd\u011bpodobnost \u00fasp\u011bchu v procentech. Nut\u00ed v\u00e1s to p\u0159em\u00fd\u0161let p\u0159esn\u011bji ne\u017e vyj\u00e1d\u0159en\u00ed typu mo\u017en\u00e1 nebo asi.", "rt": "40s", "sv": 2345, "xp": 15}, {"id": "pr1", "cat": "produktivita", "src": "Atomov\u00e9 n\u00e1vyky", "au": "James Clear", "yr": 2018, "ti": "Pravidlo 1 %", "bo": "Jedno procento zlep\u0161en\u00ed ka\u017ed\u00fd den znamen\u00e1 b\u00fdt 37\u00d7 lep\u0161\u00ed za rok. Kl\u00ed\u010dem nen\u00ed motivace, ale syst\u00e9m. Zm\u011bna identity p\u0159edch\u00e1z\u00ed zm\u011bn\u011b chov\u00e1n\u00ed \u2014 m\u00edsto c\u00edle chci b\u011b\u017eet maraton si \u0159\u00edkejte: jsem b\u011b\u017eec. N\u00e1vyky se skl\u00e1daj\u00ed ze \u010dty\u0159 f\u00e1z\u00ed: podn\u011bt, touha, reakce a odm\u011bna. Zm\u011bnou podn\u011btu zm\u011bn\u00edte cel\u00fd \u0159et\u011bzec.", "in": "Clear doporu\u010duje habit stacking: nov\u00fd n\u00e1vyk nava\u017ete na existuj\u00edc\u00ed. Po rann\u00ed k\u00e1v\u011b p\u0159e\u010dtu 2 str\u00e1nky. Po ob\u011bd\u011b zap\u00ed\u0161u 3 v\u011bci, za kter\u00e9 jsem vd\u011b\u010dn\u00fd.", "dt": "Clear analyzoval v\u00fdzkumy z behavior\u00e1ln\u00ed psychologie a zformuloval 4 z\u00e1kony: 1) Ud\u011blej to viditeln\u00e9 \u2014 polo\u017ete knihu na pol\u0161t\u00e1\u0159. 2) Ud\u011blej to atraktivn\u00ed \u2014 spojte nep\u0159\u00edjemn\u00fd n\u00e1vyk s p\u0159\u00edjemn\u00fdm. 3) Ud\u011blej to snadn\u00e9 \u2014 za\u010dn\u011bte dv\u011bma minutami. 4) Ud\u011blej to uspokojiv\u00e9 \u2014 sledujte pokrok. Kl\u00ed\u010dov\u00fd koncept: nikdy nevynechejte dvakr\u00e1t za sebou. Jeden v\u00fdpadek je nehoda, dva jsou za\u010d\u00e1tek nov\u00e9ho n\u00e1vyku.", "rt": "35s", "sv": 5872, "xp": 10}, {"id": "pr2", "cat": "produktivita", "src": "Hlubok\u00e1 pr\u00e1ce", "au": "Cal Newport", "yr": 2016, "ti": "Cena p\u0159eru\u0161en\u00ed", "bo": "Po p\u0159eru\u0161en\u00ed trv\u00e1 v pr\u016fm\u011bru 23 minut n\u00e1vrat k p\u016fvodn\u00edmu soust\u0159ed\u011bn\u00ed (v\u00fdzkum Glorie Markov\u00e9, UC Irvine). Hlubok\u00e1 pr\u00e1ce \u2014 nep\u0159eru\u0161en\u00e9 soust\u0159ed\u011bn\u00ed na n\u00e1ro\u010dnou \u00falohu \u2014 je st\u00e1le vz\u00e1cn\u011bj\u0161\u00ed v ekonomice rozpt\u00fdlen\u00ed. Newport argumentuje, \u017ee schopnost hlubok\u00e9 pr\u00e1ce je superschopnost 21. stolet\u00ed.", "in": "Newport praktikuje fixed-schedule productivity: stanov\u00ed si konec dne v 17:30 a pl\u00e1nuje zp\u011btn\u011b. Omezen\u00fd \u010das ho nut\u00ed prioritizovat.", "rt": "35s", "sv": 4521, "xp": 10}, {"id": "pr3", "cat": "produktivita", "src": "The Economist (1955)", "au": "C. N. Parkinson", "yr": 1955, "ti": "Parkinson\u016fv z\u00e1kon", "bo": "Pr\u00e1ce se nat\u00e1hne, aby vyplnila \u010das, kter\u00fd j\u00ed p\u0159id\u011bl\u00edte. Report s t\u00fddenn\u00edm deadline bude trvat t\u00fdden. Se dvouhodinov\u00fdm ho zvl\u00e1dnete za dv\u011b hodiny. Parkinson to pozoroval v britsk\u00e9 st\u00e1tn\u00ed spr\u00e1v\u011b \u2014 po\u010det \u00fa\u0159edn\u00edk\u016f rostl 5\u20137 % ro\u010dn\u011b bez ohledu na objem pr\u00e1ce.", "in": "Stanovte si krat\u0161\u00ed deadline, ne\u017e je nutn\u00e9. Um\u011bl\u00e1 urgence aktivuje soust\u0159ed\u011bn\u00ed a eliminuje prokrastinaci.", "rt": "30s", "sv": 3210, "xp": 10}, {"id": "pr4", "cat": "produktivita", "src": "Osobn\u00ed produktivita", "au": "D. D. Eisenhower", "yr": 1954, "ti": "Eisenhowerova matice", "bo": "\u00dakoly se d\u011bl\u00ed do \u010dty\u0159 kvadrant\u016f: d\u016fle\u017eit\u00e9 a urgentn\u00ed (ud\u011blej), d\u016fle\u017eit\u00e9 ne urgentn\u00ed (napl\u00e1nuj), urgentn\u00ed ne d\u016fle\u017eit\u00e9 (deleguj), ani jedno (sma\u017e). V\u011bt\u0161ina lid\u00ed tr\u00e1v\u00ed \u010das ve t\u0159et\u00edm kvadrantu \u2014 has\u00ed urgentn\u00ed mali\u010dkosti m\u00edsto pr\u00e1ce na tom, co skute\u010dn\u011b z\u00e1le\u017e\u00ed.", "in": "Eisenhower prohl\u00e1sil, \u017ee to, co je d\u016fle\u017eit\u00e9, je m\u00e1lokdy urgentn\u00ed, a to, co je urgentn\u00ed, je m\u00e1lokdy d\u016fle\u017eit\u00e9.", "rt": "40s", "sv": 4567, "xp": 15}, {"id": "pr5", "cat": "produktivita", "src": "Pomodoro Technique", "au": "Francesco Cirillo", "yr": 1987, "ti": "Pomodoro technika", "bo": "25 minut pln\u00e9ho soust\u0159ed\u011bn\u00ed, 5 minut pauza. Po \u010dty\u0159ech cyklech del\u0161\u00ed pauza 15\u201330 minut. Cirillo techniku pojmenoval po kuchy\u0148sk\u00e9 minutce ve tvaru raj\u010dete. 25 minut je dost kr\u00e1tk\u00e1 doba, aby ji mozek nevn\u00edmal jako hrozbu, ale dost dlouh\u00e1 pro smyslupln\u00fd pokrok.", "in": "Funguje d\u00edky Zeigarnikov\u00e9 efektu: p\u0159eru\u0161en\u00fd \u00fakol z\u016fstane v pam\u011bti a motivuje v\u00e1s se k n\u011bmu vr\u00e1tit. Timer vytv\u00e1\u0159\u00ed um\u011bl\u00fd pocit urgence.", "rt": "35s", "sv": 3890, "xp": 10}, {"id": "pr6", "cat": "produktivita", "src": "Getting Things Done", "au": "David Allen", "yr": 2001, "ti": "Pravidlo dvou minut", "bo": "Pokud \u00fakol zabere m\u00e9n\u011b ne\u017e dv\u011b minuty, ud\u011blejte ho okam\u017eit\u011b. Samotn\u00fd proces organizov\u00e1n\u00ed kr\u00e1tk\u00e9ho \u00fakolu zabere v\u00edc \u010dasu ne\u017e jeho proveden\u00ed. Okam\u017eit\u00e9 vy\u0159\u00edzen\u00ed uvoln\u00ed ment\u00e1ln\u00ed kapacitu. Mozek dr\u017e\u00ed neuzav\u0159en\u00e9 \u00fakoly v aktivn\u00ed pam\u011bti jako otev\u0159en\u00e9 z\u00e1lo\u017eky prohl\u00ed\u017ee\u010de \u2014 ka\u017ed\u00e1 spot\u0159ebov\u00e1v\u00e1 energii.", "in": "Allen naz\u00fdv\u00e1 nezpracovan\u00e9 \u00fakoly otev\u0159en\u00fdmi smy\u010dkami. Mozek na n\u011b podv\u011bdom\u011b mysl\u00ed, dokud nejsou uzav\u0159eny. Proto se po \u00faklidu stolu c\u00edt\u00edte leh\u010deji.", "rt": "35s", "sv": 2345, "xp": 10}, {"id": "pr7", "cat": "produktivita", "src": "Eat That Frog!", "au": "Brian Tracy", "yr": 2001, "ti": "Sn\u011bz tu \u017e\u00e1bu", "bo": "Mark Twain \u00fadajn\u011b \u0159ekl: pokud mus\u00edte sn\u00edst \u017eivou \u017e\u00e1bu, ud\u011blejte to hned r\u00e1no a zbytek dne v\u00e1s nic hor\u0161\u00edho nepotk\u00e1. Tracy rad\u00ed za\u010d\u00edt den nejt\u011b\u017e\u0161\u00edm \u00fakolem, dokud m\u00e1te nejv\u00edc v\u016fle a energie. Odkl\u00e1d\u00e1n\u00ed obt\u00ed\u017en\u00fdch \u00fakol\u016f vede k prokrastinaci.", "in": "V\u00fdzkumy ukazuj\u00ed, \u017ee sebekontrola funguje jako sval \u2014 r\u00e1no je nejsiln\u011bj\u0161\u00ed a b\u011bhem dne se vy\u010derp\u00e1v\u00e1 (ego depletion).", "rt": "30s", "sv": 2678, "xp": 10}, {"id": "pr8", "cat": "produktivita", "src": "Principy ekonomie", "au": "Vilfredo Pareto", "yr": 1896, "ti": "Paret\u016fv princip 80/20", "bo": "80 % italsk\u00e9 p\u016fdy vlastn\u00ed 20 % obyvatel. Stejn\u00fd pom\u011br plat\u00ed p\u0159ekvapiv\u011b \u010dasto: 20 % z\u00e1kazn\u00edk\u016f generuje 80 % tr\u017eeb, 20 % \u00fasil\u00ed p\u0159in\u00e1\u0161\u00ed 80 % v\u00fdsledk\u016f, 20 % k\u00f3du obsahuje 80 % chyb a 20 % oble\u010den\u00ed nos\u00edte 80 % \u010dasu. Princip poukazuje na nerovnom\u011brnou distribuci, kter\u00e1 je v p\u0159\u00edrod\u011b v\u0161udyp\u0159\u00edtomn\u00e1.", "in": "Praktick\u00e1 ot\u00e1zka: kter\u00e9 aktivity pat\u0159\u00ed do va\u0161ich kl\u00ed\u010dov\u00fdch 20 %? V\u0161echno ostatn\u00ed delegujte, automatizujte nebo eliminujte.", "rt": "35s", "sv": 5123, "xp": 10}, {"id": "pr9", "cat": "produktivita", "src": "Indistractable", "au": "Nir Eyal", "yr": 2019, "ti": "Timeboxing", "bo": "M\u00edsto to-do listu si pl\u00e1nujte den do \u010dasov\u00fdch blok\u016f. To-do list je jen seznam p\u0159\u00e1n\u00ed bez z\u00e1vazku. Blok 9:00\u201310:30 pro hlubokou pr\u00e1ci je z\u00e1vazek, kter\u00fd je t\u011b\u017e\u0161\u00ed ignorovat. Timeboxing eliminuje rozhodovac\u00ed \u00fanavu \u2014 nemus\u00edte p\u0159em\u00fd\u0161let co d\u011blat, proto\u017ee u\u017e je to napl\u00e1nov\u00e1no.", "in": "Elon Musk a Bill Gates pou\u017e\u00edvaj\u00ed timeboxing. Musk si pl\u00e1nuje den v p\u011btiminutov\u00fdch bloc\u00edch. Kl\u00ed\u010d je napl\u00e1novat i odpo\u010dinek.", "rt": "35s", "sv": 1987, "xp": 10}, {"id": "pr10", "cat": "produktivita", "src": "Stanford University Study", "au": "Ekonomick\u00fd princip", "yr": 2014, "ti": "Klesaj\u00edc\u00ed v\u00fdnosy", "bo": "Produktivita prudce kles\u00e1 po 50 hodin\u00e1ch t\u00fddn\u011b a po 55 hodin\u00e1ch je prakticky nulov\u00e1. \u010clov\u011bk pracuj\u00edc\u00ed 70 hodin nedos\u00e1hne v\u00edc ne\u017e ten, kdo pracuje 55. Posledn\u00edch 15 hodin nejen nep\u0159id\u00e1v\u00e1 hodnotu, ale zp\u016fsobuje chyby, kter\u00e9 je t\u0159eba opravit \u2014 \u010dist\u00e1 produktivita je tedy z\u00e1porn\u00e1.", "in": "Japonsk\u00fd pojem kar\u00f3\u0161i \u2014 smrt z p\u0159epracov\u00e1n\u00ed \u2014 je extr\u00e9mn\u00edm d\u016fsledkem ignorov\u00e1n\u00ed klesaj\u00edc\u00edch v\u00fdnos\u016f. V Japonsku je ro\u010dn\u011b uzn\u00e1no stovky p\u0159\u00edpad\u016f.", "rt": "35s", "sv": 2345, "xp": 15}, {"id": "pr11", "cat": "produktivita", "src": "Essentialism", "au": "Greg McKeown", "yr": 2014, "ti": "M\u00e9n\u011b, ale l\u00e9pe", "bo": "V\u011bt\u0161ina v\u011bc\u00ed v \u017eivot\u011b je ned\u016fle\u017eit\u00e1. Esencialismus nen\u00ed o tom, jak stihnout v\u00edc, ale jak d\u011blat spr\u00e1vn\u00e9 v\u011bci. M\u00edsto ot\u00e1zky jak to v\u0161echno zvl\u00e1dnu se ptejte: co je to jedin\u00e9, co opravdu z\u00e1le\u017e\u00ed? Pokud ne\u0159\u00edk\u00e1te ne t\u00e9m\u011b\u0159 v\u0161emu, nedostate\u010dn\u011b chr\u00e1n\u00edte to, na \u010dem v\u00e1m z\u00e1le\u017e\u00ed.", "in": "McKeown doporu\u010duje 90% pravidlo: pokud n\u011bco nen\u00ed alespo\u0148 9 z 10, je to ne. Pr\u016fm\u011brnost nen\u00ed kompromis, ale past.", "rt": "35s", "sv": 2890, "xp": 15}, {"id": "pr12", "cat": "produktivita", "src": "The 4-Hour Workweek", "au": "Tim Ferriss", "yr": 2007, "ti": "Selektivn\u00ed ignorance", "bo": "Ferriss doporu\u010duje informa\u010dn\u00ed dietu: p\u0159esta\u0148te \u010d\u00edst zpr\u00e1vy, omezte e-maily na dvakr\u00e1t denn\u011b a nau\u010dte se ignorovat v\u0161e, co nen\u00ed p\u0159\u00edmo relevantn\u00ed. V\u011bt\u0161ina informac\u00ed, kter\u00e9 konzumujete, nem\u00e1 \u017e\u00e1dn\u00fd vliv na va\u0161e rozhodnut\u00ed. Jsou to jen ment\u00e1ln\u00ed kalorie bez v\u00fd\u017eivov\u00e9 hodnoty.", "in": "Ferriss pou\u017e\u00edv\u00e1 pravidlo: pokud to m\u016f\u017ee po\u010dkat do p\u00e1tku, neotev\u00edrejte to p\u0159ed p\u00e1tkem. V\u011bt\u0161ina urgentn\u00edho se vy\u0159e\u0161\u00ed sama.", "rt": "30s", "sv": 3456, "xp": 10}, {"id": "pr13", "cat": "produktivita", "src": "When", "au": "Daniel Pink", "yr": 2018, "ti": "Chronotypy a produktivita", "bo": "V\u011bt\u0161ina lid\u00ed m\u00e1 nejvy\u0161\u0161\u00ed kognitivn\u00ed v\u00fdkon dopoledne (analytick\u00e9 \u00fakoly), pokles po ob\u011bd\u011b (rutina) a druh\u00fd vrchol pozd\u011b odpoledne (kreativn\u00ed \u00fakoly). Asi 20 % populace jsou sovy, pro n\u011b je vzorec obr\u00e1cen\u00fd. Zn\u00e1t sv\u016fj chronotyp a p\u0159izp\u016fsobit tomu rozvrh m\u016f\u017ee zv\u00fd\u0161it produktivitu a\u017e o 20 %.", "in": "Pink doporu\u010duje restora\u010dn\u00ed p\u0159est\u00e1vku: 10\u201320 minut odpoledne, ide\u00e1ln\u011b venku, bez telefonu a v pohybu. Soudci d\u00e1vaj\u00ed m\u00edrn\u011bj\u0161\u00ed rozsudky po p\u0159est\u00e1vce.", "rt": "40s", "sv": 1890, "xp": 15}, {"id": "pr14", "cat": "produktivita", "src": "Procrastination Research", "au": "Piers Steel", "yr": 2007, "ti": "Rovnice prokrastinace", "bo": "Steel formuloval rovnici: motivace = (o\u010dek\u00e1v\u00e1n\u00ed \u00d7 hodnota) / (impulzivita \u00d7 zpo\u017ed\u011bn\u00ed). Prokrastinujeme, kdy\u017e je \u00fakol daleko, nejasn\u00fd, nudn\u00fd nebo jsme impulzivn\u00ed. \u0158e\u0161en\u00ed: zkra\u0165te \u010das, zvy\u0161te jasnost, p\u0159idejte odm\u011bnu nebo sni\u017ete rozpt\u00fdlen\u00ed.", "in": "95 % lid\u00ed p\u0159izn\u00e1 prokrastinaci a 20 % ji pova\u017euje za chronick\u00fd probl\u00e9m. Nen\u00ed to lenost, ale \u0161patn\u00e9 \u0159\u00edzen\u00ed emoc\u00ed.", "rt": "40s", "sv": 2567, "xp": 15}, {"id": "f1", "cat": "finance", "src": "Psychologie pen\u011bz", "au": "Morgan Housel", "yr": 2020, "ti": "Bohatstv\u00ed je neviditeln\u00e9", "bo": "Housel rozli\u0161uje bohatstv\u00ed a p\u0159\u00edjem. Luxusn\u00ed auto je d\u016fkaz utr\u00e1cen\u00ed, ne bohatstv\u00ed. Skute\u010dn\u00e9 bohatstv\u00ed jsou pen\u00edze, kter\u00e9 jste neutratili \u2014 finan\u010dn\u00ed flexibilita, mo\u017enost volby a ochrana p\u0159ed nep\u0159edv\u00eddateln\u00fdmi ud\u00e1lostmi. Jedin\u00fd zp\u016fsob, jak b\u00fdt bohat\u00fd, je neutratit pen\u00edze, kter\u00e9 m\u00e1te.", "in": "Ronald Read, \u010derpac\u00ed technik a ukl\u00edze\u010d, na\u0161et\u0159il 8 milion\u016f USD d\u00edky trp\u011blivosti a indexov\u00e9mu investov\u00e1n\u00ed. Bohatstv\u00ed je o \u010dase, ne o p\u0159\u00edjmu.", "rt": "40s", "sv": 4156, "xp": 15}, {"id": "f2", "cat": "finance", "src": "Finan\u010dn\u00ed princip", "au": "P\u0159ipisov\u00e1no Einsteinovi", "yr": 0, "ti": "Slo\u017een\u00e9 \u00faro\u010den\u00ed", "bo": "Investice 10 000 K\u010d s 8% ro\u010dn\u00edm v\u00fdnosem naroste za 30 let na 100 627 K\u010d \u2014 desetin\u00e1sobek. Za 40 let na 217 245 K\u010d. Warren Buffett za\u010dal investovat ve 14 letech. 99,7 % sv\u00e9ho majetku vyd\u011blal po 50. narozenin\u00e1ch. Kouzlo slo\u017een\u00e9ho \u00faro\u010den\u00ed pot\u0159ebuje dek\u00e1dy, ale pak je nezastaviteln\u00e9.", "in": "Pravidlo 72: vyd\u011blte 72 \u00farokovou sazbou a zjist\u00edte, za kolik let se investice zdvojn\u00e1sob\u00ed. P\u0159i 8 % je to 9 let. P\u0159i 4 % je to 18 let.", "rt": "45s", "sv": 6789, "xp": 20}, {"id": "f3", "cat": "finance", "src": "Common Sense on Mutual Funds", "au": "John C. Bogle", "yr": 1999, "ti": "Pro\u010d index fondy vyhr\u00e1vaj\u00ed", "bo": "P\u0159es 90 % aktivn\u011b \u0159\u00edzen\u00fdch fond\u016f prohraje s trhem za obdob\u00ed 15+ let. D\u016fvod jsou poplatky: fond s 2% ro\u010dn\u00edm poplatkem v\u00e1m za 30 let se\u017eere skoro polovinu v\u00fdnos\u016f. Pasivn\u00ed index fond s poplatkem 0,03\u20130,1 % nech\u00e1 slo\u017een\u00e9 \u00faro\u010den\u00ed pracovat naplno. Bogle t\u00edm demokratizoval investov\u00e1n\u00ed.", "in": "Bogle \u0159\u00edkal, \u017ee nem\u00e1te hledat jehlu v kupce sena, ale koupit celou kupku. Jednoduch\u00e9 portfolio ze 2\u20133 fond\u016f p\u0159ekon\u00e1 90 % profesion\u00e1l\u016f.", "rt": "45s", "sv": 3456, "xp": 15}, {"id": "f4", "cat": "finance", "src": "Z\u00e1klady ekonomie", "au": "Ekonomick\u00fd princip", "yr": 0, "ti": "Inflace \u2014 tich\u00fd zlod\u011bj", "bo": "P\u0159i 5% inflaci ztrat\u00ed 100 000 K\u010d na spo\u0159ic\u00edm \u00fa\u010dtu kupn\u00ed s\u00edlu 40 % za 10 let. Pen\u00edze pod matrac\u00ed nerostou, ale ka\u017ed\u00fd rok ztr\u00e1cej\u00ed hodnotu. Inflace postihuje nejv\u00edc ty, kdo nespo\u0159\u00ed v aktivech. Historicky pr\u016fm\u011brn\u00e1 inflace v \u010cR je kolem 2\u20133 %, ale v kriz\u00edch m\u016f\u017ee sko\u010dit na 10\u201315 %.", "in": "Rozli\u0161ujte nomin\u00e1ln\u00ed a re\u00e1ln\u00fd v\u00fdnos. 4% \u00farok p\u0159i 3% inflaci je re\u00e1ln\u011b jen 1 %. Proto je d\u016fle\u017eit\u00e9 investovat, ne jen spo\u0159it.", "rt": "40s", "sv": 2890, "xp": 15}, {"id": "f5", "cat": "finance", "src": "Behavioral Economics", "au": "Ekonomick\u00fd koncept", "yr": 0, "ti": "Oportunitn\u00ed n\u00e1klady", "bo": "Ka\u017ed\u00e9 rozhodnut\u00ed m\u00e1 skrytou cenu \u2014 hodnotu nejlep\u0161\u00ed nevybran\u00e9 alternativy. Auto za 500 000 K\u010d? Skute\u010dn\u00e1 cena je v\u0161echno, co byste za ty pen\u00edze mohli m\u00edt m\u00edsto toho: investice, cestov\u00e1n\u00ed, voln\u00fd \u010das d\u00edky men\u0161\u00ed nutnosti vyd\u011bl\u00e1vat. V\u011bt\u0161ina lid\u00ed o oportunitn\u00edch n\u00e1kladech v\u016fbec nep\u0159em\u00fd\u0161l\u00ed.", "in": "Charlie Munger \u0159\u00edk\u00e1, \u017ee pochopen\u00ed oportunitn\u00edch n\u00e1klad\u016f je z\u00e1kladem ka\u017ed\u00e9ho dobr\u00e9ho rozhodnut\u00ed. P\u0159ed ka\u017ed\u00fdm n\u00e1kupem se zeptejte: co jin\u00e9ho bych za to mohl m\u00edt?", "rt": "40s", "sv": 1567, "xp": 15}, {"id": "f6", "cat": "finance", "src": "Priceless", "au": "William Poundstone", "yr": 2010, "ti": "Zakotven\u00ed ceny", "bo": "Restaurace za\u0159azuj\u00ed extr\u00e9mn\u011b drah\u00e9 j\u00eddlo do menu ne proto, aby ho prod\u00e1valy, ale aby v\u0161echno ostatn\u00ed vypadalo p\u0159ijateln\u011b. Apple p\u0159edstavuje nejdra\u017e\u0161\u00ed iPhone jako prvn\u00ed ne proto, \u017ee ho kupuje v\u011bt\u0161ina, ale proto, \u017ee ukotvuje va\u0161e vn\u00edm\u00e1n\u00ed ceny. Jakmile vid\u00edte model za 45 000 K\u010d, verze za 29 000 se zd\u00e1 rozumn\u00e1.", "in": "V jedn\u00e1n\u00ed o platu v\u017edy \u0159ekn\u011bte sv\u00e9 \u010d\u00edslo jako prvn\u00ed. Kdo ud\u011bl\u00e1 prvn\u00ed nab\u00eddku, stanov\u00ed kotvu, kolem kter\u00e9 se bude cel\u00e9 vyjedn\u00e1v\u00e1n\u00ed to\u010dit.", "rt": "35s", "sv": 2345, "xp": 10}, {"id": "f7", "cat": "finance", "src": "The Intelligent Investor", "au": "Benjamin Graham", "yr": 1949, "ti": "Pan Trh", "bo": "Graham, u\u010ditel Warrena Buffetta, p\u0159edstavil alegorii Pana Trhu. Ka\u017ed\u00fd den v\u00e1m nab\u00edz\u00ed koupit nebo prodat akcie za jinou cenu. N\u011bkdy je optimistick\u00fd, jindy depresivn\u00ed. V\u00e1\u0161 \u00fakol nen\u00ed reagovat na jeho n\u00e1lady, ale vyu\u017e\u00edt je. Kdy\u017e je depresivn\u00ed, kupujete lacino.", "in": "Buffett \u0159\u00edk\u00e1: bojte se, kdy\u017e jsou ostatn\u00ed chamtiv\u00ed, a bu\u010fte chamtiv\u00ed, kdy\u017e se ostatn\u00ed boj\u00ed. Emocion\u00e1ln\u00ed odstup od trhu je nejv\u011bt\u0161\u00ed v\u00fdhoda individu\u00e1ln\u00edho investora.", "rt": "40s", "sv": 3890, "xp": 15}, {"id": "f8", "cat": "finance", "src": "The Millionaire Next Door", "au": "Thomas Stanley", "yr": 1996, "ti": "Pr\u016fm\u011brn\u00fd milion\u00e1\u0159", "bo": "Typick\u00fd milion\u00e1\u0159 nen\u00ed doktor, ale majitel mal\u00e9 firmy, kter\u00fd jezd\u00ed ojet\u00fdm autem, \u017eije v pr\u016fm\u011brn\u00e9m dom\u011b a systematicky spo\u0159\u00ed 15\u201320 % p\u0159\u00edjmu. 80 % americk\u00fdch milion\u00e1\u0159\u016f je prvn\u00ed generace \u2014 bohatstv\u00ed nevzd\u011bdili, ale vybudovali. Kl\u00ed\u010dov\u00fd rozd\u00edl nen\u00ed p\u0159\u00edjem, ale spo\u0159ivost.", "in": "Stanley rozli\u0161uje UAW (Under Accumulator of Wealth) a PAW (Prodigious Accumulator). P\u0159i stejn\u00e9m p\u0159\u00edjmu m\u016f\u017ee jeden b\u00fdt bohat\u00fd a druh\u00fd chud\u00fd.", "rt": "40s", "sv": 2567, "xp": 15}, {"id": "f9", "cat": "finance", "src": "\u010cern\u00e1 labu\u0165", "au": "Nassim Taleb", "yr": 2007, "ti": "\u010cern\u00e9 labut\u011b", "bo": "Taleb definuje \u010dernou labu\u0165 jako ud\u00e1lost, kter\u00e1 je nep\u0159edv\u00eddateln\u00e1, m\u00e1 masivn\u00ed dopad a zp\u011btn\u011b ji v\u0161ichni vysv\u011btluj\u00ed jako o\u010dividnou. P\u00e1d Lehman Brothers, COVID-19, vzestup internetu \u2014 v\u0161echno \u010dern\u00e9 labut\u011b. Finan\u010dn\u00ed modely je nezachyt\u00ed, proto\u017ee vych\u00e1zej\u00ed z norm\u00e1ln\u00edho rozd\u011blen\u00ed, ale realita m\u00e1 tlust\u00e9 chvosty.", "in": "Nesna\u017ete se \u010dern\u00e9 labut\u011b p\u0159edpov\u00eddat, ale budujte antifragilitu \u2014 portfolio a \u017eivot, kter\u00fd z neo\u010dek\u00e1van\u00fdch ud\u00e1lost\u00ed profituje m\u00edsto toho, aby se zhroutil.", "rt": "45s", "sv": 3210, "xp": 20}, {"id": "f10", "cat": "finance", "src": "Rich Dad Poor Dad", "au": "Robert Kiyosaki", "yr": 1997, "ti": "Aktiva vs. pasiva", "bo": "Aktivum v\u00e1m p\u0159in\u00e1\u0161\u00ed pen\u00edze, pasivum v\u00e1m pen\u00edze bere. D\u016fm, ve kter\u00e9m bydl\u00edte, je pasivum (hypot\u00e9ka, dan\u011b, opravy). D\u016fm, kter\u00fd pronaj\u00edm\u00e1te, je aktivum. Nov\u00e9 auto je pasivum. Investice do indexov\u00e9ho fondu je aktivum. V\u011bt\u0161ina lid\u00ed kupuje pasiva a mysl\u00ed si, \u017ee jsou bohat\u00ed.", "in": "Kiyosakiho zjednodu\u0161en\u00ed je kritizov\u00e1no ekonomy, ale z\u00e1kladn\u00ed princip plat\u00ed: sledujte, jestli va\u0161e n\u00e1kupy generuj\u00ed p\u0159\u00edjem nebo spot\u0159ebu.", "rt": "35s", "sv": 4567, "xp": 15}, {"id": "f11", "cat": "finance", "src": "A Random Walk Down Wall Street", "au": "Burton Malkiel", "yr": 1973, "ti": "N\u00e1hodn\u00e1 proch\u00e1zka", "bo": "Kr\u00e1tkodob\u00e9 pohyby cen akci\u00ed jsou n\u00e1hodn\u00e9 a nep\u0159edv\u00eddateln\u00e9. \u017d\u00e1dn\u00e1 technick\u00e1 anal\u00fdza nedok\u00e1\u017ee spolehliv\u011b p\u0159edpov\u00eddat trh. Data ukazuj\u00ed, \u017ee \u0161impanz h\u00e1zej\u00edc\u00ed \u0161ipky na seznam akci\u00ed m\u00e1 srovnatelnou \u00fasp\u011b\u0161nost jako pr\u016fm\u011brn\u00fd portfolio mana\u017eer.", "in": "Malkiel je jedn\u00edm z d\u016fvod\u016f, pro\u010d indexov\u00e9 fondy existuj\u00ed. Pokud trh nelze porazit, nem\u00e1 smysl platit n\u011bkomu, kdo se o to pokou\u0161\u00ed.", "rt": "40s", "sv": 1890, "xp": 15}, {"id": "f12", "cat": "finance", "src": "Your Money or Your Life", "au": "Vicki Robin", "yr": 1992, "ti": "Skute\u010dn\u00e1 cena v\u011bc\u00ed", "bo": "Robin doporu\u010duje po\u010d\u00edtat cenu v\u011bc\u00ed v hodin\u00e1ch pr\u00e1ce, ne v korun\u00e1ch. Pokud vyd\u011bl\u00e1v\u00e1te 200 K\u010d na hodinu a boty stoj\u00ed 3000 K\u010d, jejich skute\u010dn\u00e1 cena je 15 hodin va\u0161eho \u017eivota. Tato perspektiva radik\u00e1ln\u011b zm\u011bn\u00ed n\u00e1kupn\u00ed chov\u00e1n\u00ed.", "in": "Robin navrhl koncept bodu dostatku \u2014 \u00farovn\u011b, po kter\u00e9 dal\u0161\u00ed pen\u00edze nep\u0159id\u00e1vaj\u00ed \u0161t\u011bst\u00ed. V\u00fdzkumy ukazuj\u00ed, \u017ee v USA je to zhruba 75 000 USD ro\u010dn\u011b.", "rt": "40s", "sv": 2123, "xp": 15}, {"id": "fi1", "cat": "filosofie", "src": "Hovory k sob\u011b", "au": "Marcus Aurelius", "yr": 180, "ti": "Co m\u016f\u017ee\u0161 ovl\u00e1dat", "bo": "Nem\u016f\u017eeme ovl\u00e1dat vn\u011bj\u0161\u00ed ud\u00e1losti, ale m\u016f\u017eeme ovl\u00e1dat svou reakci. Stoick\u00e1 dichotomie kontroly \u0159\u00edk\u00e1: soust\u0159e\u010fte energii jen na to, co je ve va\u0161\u00ed moci. Po\u010das\u00ed, dopravn\u00ed z\u00e1cpy, n\u00e1zory druh\u00fdch \u2014 to v\u0161e je mimo va\u0161i kontrolu. Jedin\u00e9, co m\u016f\u017eete ovl\u00e1dat, je vlastn\u00ed \u00fasudek, z\u00e1m\u011br a reakce.", "in": "Tento princip rozvinul Epikt\u00e9tos a pozd\u011bji se stal z\u00e1kladem kognitivn\u011b-behavior\u00e1ln\u00ed terapie (CBT). Aaron Beck, zakladatel CBT, explicitn\u011b citoval stoiky.", "rt": "40s", "sv": 3890, "xp": 20}, {"id": "fi2", "cat": "filosofie", "src": "Radostn\u00e1 v\u011bda", "au": "Friedrich Nietzsche", "yr": 1882, "ti": "Amor fati", "bo": "Nietzsche formuloval my\u0161lenku, \u017ee bychom m\u011bli nejen p\u0159ijmout sv\u016fj osud, ale milovat ho \u2014 v\u010detn\u011b utrpen\u00ed. Ka\u017ed\u00e1 bolest a ka\u017ed\u00fd ne\u00fasp\u011bch je sou\u010d\u00e1st\u00ed cesty, kter\u00e1 v\u00e1s formovala. Odm\u00edtat \u010d\u00e1sti sv\u00e9ho \u017eivota znamen\u00e1 odm\u00edtat sebe sama.", "in": "Amor fati neznamen\u00e1 pasivitu. Znamen\u00e1 p\u0159estat bojovat s minulost\u00ed a zam\u011b\u0159it energii na p\u0159\u00edtomnost. Ryan Holiday popularizoval tento koncept v knize The Obstacle Is the Way.", "rt": "40s", "sv": 2345, "xp": 15}, {"id": "fi3", "cat": "filosofie", "src": "Stoick\u00e1 filosofie", "au": "Stoicismus", "yr": -300, "ti": "Memento mori", "bo": "V\u011bdom\u00ed vlastn\u00ed smrtelnosti je osvobozuj\u00edc\u00ed. Stoikov\u00e9 doporu\u010dovali ka\u017ed\u00fd den p\u0159ipom\u00ednat si, \u017ee \u017eivot je kone\u010dn\u00fd. Ne proto, abyste se b\u00e1li, ale proto, abyste p\u0159estali odkl\u00e1dat to, na \u010dem z\u00e1le\u017e\u00ed. Steve Jobs \u0159\u00edkal, \u017ee v\u011bdom\u00ed smrti je nejlep\u0161\u00ed n\u00e1stroj proti strachu z ne\u00fasp\u011bchu.", "in": "Seneca napsal, \u017ee nen\u00ed m\u00e1lo \u010dasu, kter\u00fd m\u00e1me, ale hodn\u011b \u010dasu, kter\u00fd promarn\u00edme. Memento mori nen\u00ed o smrti \u2014 je o tom, jak \u017e\u00edt.", "rt": "40s", "sv": 4567, "xp": 20}, {"id": "fi4", "cat": "filosofie", "src": "M\u00fdtus o Sisyfovi", "au": "Albert Camus", "yr": 1942, "ti": "Absurdn\u00ed hrdina", "bo": "Sisyfos val\u00ed balvan do kopce, ten se skut\u00e1l\u00ed dol\u016f, a Sisyfos za\u010dne znovu. Camus tvrd\u00ed, \u017ee pr\u00e1v\u011b v tomto opakov\u00e1n\u00ed m\u016f\u017eeme naj\u00edt smysl. \u017divot nem\u00e1 p\u0159edem dan\u00fd v\u00fdznam, ale to neznamen\u00e1, \u017ee je bezcenn\u00fd. Smysl vytv\u00e1\u0159\u00edme my sami, v procesu, v boji, v rozhodnut\u00ed pokra\u010dovat.", "in": "Camus kon\u010d\u00ed my\u0161lenkou, \u017ee si mus\u00edme p\u0159edstavit Sisyfa \u0161\u0165astn\u00e9ho. Smysl nen\u00ed c\u00edl \u2014 je to cesta. \u017divot nem\u00e1 b\u00fdt vysv\u011btlen\u00fd, ale pro\u017eit\u00fd.", "rt": "45s", "sv": 3210, "xp": 20}, {"id": "fi5", "cat": "filosofie", "src": "\u00dastava (Politeia)", "au": "Plat\u00f3n", "yr": -380, "ti": "Jeskyn\u011b", "bo": "Lid\u00e9 sed\u00ed v jeskyni z\u00e1dy ke vchodu a vid\u00ed jen st\u00edny na st\u011bn\u011b. Pova\u017euj\u00ed je za realitu. Kdy\u017e se jeden oto\u010d\u00ed a uvid\u00ed skute\u010dn\u00e9 sv\u011btlo, ostatn\u00ed mu nev\u011b\u0159\u00ed. Plat\u00f3nova alegorie popisuje, jak t\u011b\u017ek\u00e9 je opustit omezen\u00e9 vn\u00edm\u00e1n\u00ed \u2014 a jak nepopul\u00e1rn\u00ed je \u0159\u00edkat pravdu t\u011bm, kdo \u017eij\u00ed v iluz\u00edch.", "in": "V digit\u00e1ln\u00ed dob\u011b je Plat\u00f3nova jeskyn\u011b relevantn\u011bj\u0161\u00ed ne\u017e d\u0159\u00edve \u2014 soci\u00e1ln\u00ed bubliny a algoritmy vytv\u00e1\u0159ej\u00ed modern\u00ed st\u00edny na st\u011bn\u011b.", "rt": "40s", "sv": 5678, "xp": 20}, {"id": "fi6", "cat": "filosofie", "src": "Z\u00e1klady metafyziky mrav\u016f", "au": "Immanuel Kant", "yr": 1785, "ti": "Kategorick\u00fd imperativ", "bo": "Jednej jen podle z\u00e1sady, o kter\u00e9 bys z\u00e1rove\u0148 mohl cht\u00edt, aby se stala obecn\u00fdm z\u00e1konem. Pokud je lhan\u00ed \u0161patn\u00e9, je \u0161patn\u00e9 v\u017edy \u2014 bez v\u00fdjimek. Kant tak\u00e9 formuloval: jednej s ka\u017ed\u00fdm \u010dlov\u011bkem v\u017edy tak\u00e9 jako s \u00fa\u010delem, nikdy jen jako s prost\u0159edkem. Lid\u00e9 nejsou n\u00e1stroje.", "in": "P\u0159ed ka\u017ed\u00fdm \u010dinem se zeptejte, co by se stalo, kdyby to d\u011blal \u00fapln\u011b ka\u017ed\u00fd. Pokud by to nefungovalo, ned\u011blejte to. Je to univerz\u00e1ln\u00ed test mor\u00e1lnosti.", "rt": "35s", "sv": 1987, "xp": 15}, {"id": "fi7", "cat": "filosofie", "src": "Tao te \u0165ing", "au": "Lao-c'", "yr": -400, "ti": "Wu wei", "bo": "Wu wei neznamen\u00e1 lenost. Znamen\u00e1 jednat p\u0159irozen\u011b, bez zbyte\u010dn\u00e9ho vynucov\u00e1n\u00ed. Jako voda, kter\u00e1 te\u010de kolem p\u0159ek\u00e1\u017eek m\u00edsto st\u0159etu s nimi. Lao-c' u\u010dil, \u017ee nej\u00fa\u010dinn\u011bj\u0161\u00ed jedn\u00e1n\u00ed vypad\u00e1, jako by se nic ned\u011blo. Dobr\u00fd v\u016fdce, kdy\u017e dokon\u010d\u00ed
