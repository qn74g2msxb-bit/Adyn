.dtv{flex:1;padding:16px 20px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .4s ease}.dtv .bk{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:12px;color:var(--ac);margin-bottom:14px;padding:6px 0;background:none;border:none;cursor:pointer}.dtv h1{font-family:var(--fd);font-size:26px;font-weight:700;line-height:1.2;margin-bottom:8px}.dtv .mt{font-size:13px;color:#94A3B8;margin-bottom:20px}.dtv .sl2{font-family:var(--fm);font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}.dtv .bt{font-size:16px;line-height:1.75;color:var(--t2);margin-bottom:24px}.dtv .ib{border-radius:14px;padding:14px 16px;margin-bottom:24px}.dtv .db{border-radius:14px;padding:16px 18px;margin-bottom:24px;background:linear-gradient(165deg,var(--c1),var(--c2));border:1px solid var(--bl)}

<script>
var DL=10;
var CATS=[{id:"psy",label:"Psychologie",icon:"\u{1F9E0}",color:"#FF6B6B"},{id:"prod",label:"Produktivita",icon:"\u26A1",color:"#4ECDC4"},{id:"fin",label:"Finance",icon:"\u{1F4B0}",color:"#FFD93D"},{id:"fil",label:"Filosofie",icon:"\u{1F52E}",color:"#A78BFA"},{id:"kom",label:"Komunikace",icon:"\u{1F4AC}",color:"#F472B6"},{id:"zdr",label:"Zdrav\u00ED",icon:"\u{1F33F}",color:"#34D399"},{id:"ved",label:"V\u011Bda",icon:"\u{1F52C}",color:"#06B6D4"},{id:"tech",label:"Tech",icon:"\u{1F5A5}",color:"#8B5CF6"},{id:"his",label:"Historie",icon:"\u{1F4DC}",color:"#F59E0B"},{id:"neur",label:"Neurov\u011Bda",icon:"\u{1F9EC}",color:"#EC4899"},{id:"soc",label:"Spole\u010Dnost",icon:"\u{1F30D}",color:"#10B981"},{id:"evo",label:"Evoluce",icon:"\u{1F9EC}",color:"#14B8A6"},{id:"mat",label:"Matematika",icon:"\u{1F522}",color:"#6366F1"},{id:"kre",label:"Kreativita",icon:"\u{1F3A8}",color:"#F472B6"},{id:"eko",label:"Ekologie",icon:"\u{1F331}",color:"#22C55E"}];
var CD=[{"id":"p1","cat":"psy","src":"My\u0161len\u00ed, rychl\u00e9 a pomal\u00e9","au":"Daniel Kahneman","yr":2011,"ti":"Dva syst\u00e9my my\u0161len\u00ed","bo":"Tv\u016fj mozek m\u00e1 dv\u011b verze sebe. Syst\u00e9m 1 je rychl\u00fd, l\u00edn\u00fd a sebejist\u00fd \u2014 rozhodne za milisekundu, jestli se ti n\u011bkdo l\u00edb\u00ed. Syst\u00e9m 2 je pomal\u00fd a analytick\u00fd \u2014 zapne se p\u0159i po\u010d\u00edt\u00e1n\u00ed 17 \u00d7 24. Probl\u00e9m? Syst\u00e9m 1 \u0159\u00edd\u00ed 95 % tv\u00fdch rozhodnut\u00ed. A systematicky se m\u00fdl\u00ed. Kahneman za tento v\u00fdzkum dostal Nobela.","ko":"Kdy\u017e m\u00e1\u0161 u d\u016fle\u017eit\u00e9ho rozhodnut\u00ed pocit okam\u017eit\u00e9 jistoty \u2014 pozor. To je Syst\u00e9m 1, kter\u00fd odpov\u00edd\u00e1 na jednodu\u0161\u0161\u00ed ot\u00e1zku, ne\u017e jsi polo\u017eil.","dt":"Kahneman str\u00e1vil des\u00edtky let v\u00fdzkumem s Amosem Tverskym. Spole\u010dn\u011b vytvo\u0159ili Prospect Theory, za kterou Kahneman dostal Nobelovu cenu v roce 2002. Syst\u00e9m 1 zpracov\u00e1v\u00e1 informace paraleln\u011b \u2014 zvl\u00e1dne rozpoznat emoce nebo \u0159\u00eddit auto v pr\u00e1zdn\u00e9 ulici. Syst\u00e9m 2 je s\u00e9riov\u00fd \u2014 aktivuje se p\u0159i slo\u017eit\u00e9m po\u010d\u00edt\u00e1n\u00ed nebo parkov\u00e1n\u00ed. Probl\u00e9m nast\u00e1v\u00e1, kdy\u017e Syst\u00e9m 1 odpov\u00edd\u00e1 na ot\u00e1zky pro Syst\u00e9m 2. Kahneman identifikoval des\u00edtky kognitivn\u00edch zkreslen\u00ed: kotven\u00ed, dostupnostn\u00ed heuristika, efekt r\u00e1mov\u00e1n\u00ed. Praktick\u00fd dopad: p\u0159i d\u016fle\u017eit\u00e9m rozhodnut\u00ed se zeptejte \u2014 odpov\u00edd\u00e1 te\u010f m\u016fj Syst\u00e9m 1 nebo 2?","rt":"45s","sv":2341,"xp":15},{"id":"p2","cat":"psy","src":"Journal of Personality and Social Psychology","au":"Kruger & Dunning","yr":1999,"ti":"Dunning-Kruger\u016fv efekt","bo":"Nejm\u00e9n\u011b kompetentn\u00ed lid\u00e9 si nejv\u00edc v\u011b\u0159\u00ed. Kruger a Dunning z Cornellu to zm\u011b\u0159ili: \u00fa\u010dastn\u00edci v doln\u00edm kvartilu odhadovali sv\u016fj v\u00fdkon na 62. percentil. Nekompetentn\u00ed \u010dlov\u011bk nejen chybuje \u2014 chyb\u00ed mu schopnost poznat, \u017ee chybuje. Experti naopak sv\u00e9 schopnosti podce\u0148uj\u00ed.","ko":"\u010c\u00edm v\u00edc toho v\u00ed\u0161, t\u00edm v\u00edc v\u00ed\u0161, co nev\u00ed\u0161. P\u0159\u00ed\u0161t\u011b, kdy\u017e na pohovoru potk\u00e1\u0161 nejhlasit\u011bj\u0161\u00edho kandid\u00e1ta \u2014 mo\u017en\u00e1 nen\u00ed nejkompetentn\u011bj\u0161\u00ed.","dt":"\u00da\u010dastn\u00edci v doln\u00edm kvartilu odhadovali sv\u016fj v\u00fdkon na 62. percentil \u2014 dramatick\u00e9 nadhodnocen\u00ed. Efekt m\u00e1 dv\u011b \u010d\u00e1sti: nekompetentn\u00ed p\u0159ece\u0148uj\u00ed sebe a nedok\u00e1\u017e\u00ed rozpoznat kompetenci u druh\u00fdch. Po tr\u00e9ninku jejich sebed\u016fv\u011bra paradoxn\u011b klesla \u2014 teprve pak pochopili, co nev\u011bd\u011bli. D\u016fsledky: v medic\u00edn\u011b si pacienti diagnostikuj\u00ed nemoci na internetu, v politice si voli\u010di jsou jisti bez znalost\u00ed, na s\u00edt\u00edch jsou nejhlasit\u011bj\u0161\u00ed koment\u00e1to\u0159i nejm\u00e9n\u011b informovan\u00ed.","rt":"40s","sv":3102,"xp":15},{"id":"p3","cat":"psy","src":"Judgment under Uncertainty","au":"Tversky & Kahneman","yr":1974,"ti":"Efekt kotven\u00ed","bo":"Prvn\u00ed \u010d\u00edslo, kter\u00e9 usly\u0161\u00ed\u0161, zm\u011bn\u00ed tv\u016fj odhad \u2014 i kdy\u017e s t\u00e9matem v\u016fbec nesouvis\u00ed. \u00da\u010dastn\u00edci v Tversk\u00e9ho studii to\u010dili kolem \u0161t\u011bst\u00ed a pak odhadovali procento africk\u00fdch zem\u00ed v OSN. Skupina s \u010d\u00edslem 65 odhadovala v\u00fdrazn\u011b v\u00fd\u0161 ne\u017e skupina s 10. N\u00e1hodn\u00e9 \u010d\u00edslo p\u0159epsalo \u00fasudek.","ko":"V obchod\u011b p\u0159e\u0161krtnut\u00e1 cena 2999 K\u010d a nov\u00e1 999 K\u010d? Tv\u016fj mozek zaregistroval 2999 jako kotvu. Sleva vypad\u00e1 obrovsk\u00e1. P\u0159esn\u011b to cht\u011bli.","dt":"Soudci v n\u011bmeck\u00e9 studii dostali n\u00e1hodn\u00e9 \u010d\u00edslo a jejich rozsudky s n\u00edm korelovaly. Realitn\u00ed makl\u00e9\u0159i odhadovali cenu domu jinak podle v\u00fdchoz\u00ed ceny. Mechanismus: nedostate\u010dn\u00e9 p\u0159izp\u016fsoben\u00ed od kotvy a selektivn\u00ed aktivace konzistentn\u00edch informac\u00ed v pam\u011bti. Apple p\u0159edstavuje nejdra\u017e\u0161\u00ed iPhone prvn\u00ed \u2014 ukotvuje vn\u00edm\u00e1n\u00ed ceny. P\u0159i vyjedn\u00e1v\u00e1n\u00ed o platu: kdo \u0159ekne \u010d\u00edslo prvn\u00ed, stanov\u00ed kotvu. Obrana: v\u011bdom\u011b zva\u017ete opa\u010dn\u00fd extr\u00e9m.","rt":"40s","sv":1987,"xp":15},{"id":"p4","cat":"psy","src":"A Theory of Cognitive Dissonance","au":"Leon Festinger","yr":1957,"ti":"Kognitivn\u00ed disonance","bo":"Sekta v\u011b\u0159ila v konec sv\u011bta. Sv\u011bt neskon\u010dil. A \u010dlenov\u00e9? Svou v\u00edru pos\u00edlili. Festinger se do sekty infiltroval a sledoval, jak mozek \u0159e\u0161\u00ed rozpor mezi p\u0159esv\u011bd\u010den\u00edm a realitou. Rad\u011bji p\u0159ekrout\u00ed realitu, ne\u017e zm\u011bn\u00ed p\u0159esv\u011bd\u010den\u00ed. \u010c\u00edm v\u00edc do n\u00e1zoru investuje\u0161, t\u00edm t\u011b\u017e\u0161\u00ed je ustoupit.","ko":"Koupil sis drah\u00e9 auto? Za\u010dne\u0161 hledat pozitivn\u00ed recenze. Ne proto, \u017ee jsou pravdiv\u00e9 \u2014 ale proto, \u017ee pot\u0159ebuje\u0161 zm\u00edrnit pochybnost.","dt":"Festinger se infiltroval do sekty Dorothy Martinov\u00e9. Kdy\u017e se proroctv\u00ed nesplnilo, \u010dlenov\u00e9 za\u010dali je\u0161t\u011b aktivn\u011bji verbovat. \u010c\u00edm v\u00edc investujete (\u010das, pen\u00edze, vztahy), t\u00edm t\u011b\u017e\u0161\u00ed je p\u0159esv\u011bd\u010den\u00ed opustit. Kupte si drah\u00e9 auto a za\u010dnete vyhled\u00e1vat pozitivn\u00ed recenze. Ku\u0159\u00e1k v\u00ed, \u017ee kou\u0159en\u00ed ruje\u0161 ty, \u017ee se m\u00fdl\u00ed\u0161. Wason dal lidem \u0159adu 2, 4, 6 a po\u017e\u00e1dal je, aby zjistili pravidlo. V\u0161ichni testovali 8, 10, 12 \u2014 potvrzen\u00ed sv\u00e9 hypot\u00e9zy. Sta\u010dilo zkusit 1, 5, 9. Pravidlo bylo jednoduch\u00e9: t\u0159i rostouc\u00ed \u010d\u00edsla.","ko":"Na soci\u00e1ln\u00edch s\u00edt\u00edch ti algoritmus ukazuje obsah, se kter\u00fdm souhlas\u00ed\u0161. Ne proto, \u017ee je pravdiv\u00fd \u2014 ale proto, \u017ee na n\u011bj klikne\u0161.","dt":"Wason dal \u0159adu 2, 4, 6. T\u00e9m\u011b\u0159 v\u0161ichni testovali jen sud\u00e1 rostouc\u00ed \u010d\u00edsla. Sta\u010dilo zkusit 1, 5, 9. Potvrzovac\u00ed zkreslen\u00ed je j\u00e1dro politick\u00e9 polarizace, konspira\u010dn\u00edch teori\u00ed i \u0161patn\u00fdch obchodn\u00edch rozhodnut\u00ed. V medic\u00edn\u011b l\u00e9ka\u0159i s prvotn\u00ed diagn\u00f3zou podv\u011bdom\u011b hledaj\u00ed potvrzuj\u00edc\u00ed p\u0159\u00edznaky. Obrana: aktivn\u011b hledejte d\u016fkazy PROTI sv\u00e9mu p\u0159esv\u011bd\u010den\u00ed.","rt":"40s","sv":2134,"xp":15},{"id":"p10","cat":"psy","src":"Bystander Effect Study","au":"Darley & Latan\u00e9","yr":1968,"ti":"Efekt p\u0159ihl\u00ed\u017eej\u00edc\u00edho","bo":"\u010c\u00edm v\u00edc lid\u00ed sleduje nehodu, t\u00edm m\u00e9n\u011b pravd\u011bpodobn\u00e9, \u017ee n\u011bkdo pom\u016f\u017ee. S\u00e1m: 85 % pom\u016f\u017ee. Ve skupin\u011b p\u011bti: 31 %. Darley a Latan\u00e9 to zm\u011b\u0159ili po vra\u017ed\u011b Kitty Genovese v New Yorku, kde des\u00edtky sv\u011bdk\u016f nezas\u00e1hly. Ka\u017ed\u00fd \u010dekal na druh\u00e9ho.","ko":"Pot\u0159ebuje\u0161-li pomoc, uka\u017e na konkr\u00e9tn\u00edho \u010dlov\u011bka: ty v modr\u00e9 bund\u011b, zavolej z\u00e1chranku. Adresn\u00e1 prosba funguje 10\u00d7 l\u00edp ne\u017e obecn\u00e9 vol\u00e1n\u00ed.","dt":"T\u0159i mechanismy: rozptyl odpov\u011bdnosti, pluralitn\u00ed ignorance (nikdo nereaguje = asi to nen\u00ed v\u00e1\u017en\u00e9) a ev 17e ekologick\u00fd apel. 'Pouze 3 kusy skladem' dramaticky zvy\u0161uje konverzi. Cialdini str\u00e1vil 3 roky tajn\u011b pracuj\u00edc\u00ed v autobazarech a charit\u00e1ch, aby popsal 6 princip\u016f p\u0159esv\u011bd\u010dov\u00e1n\u00ed: reciprocita, z\u00e1vazek, soci\u00e1ln\u00ed d\u016fkaz, autorita, obliba, vz\u00e1cnost.","ko":"Limitovan\u00e1 edice = vz\u00e1cnost. Recenze = soci\u00e1ln\u00ed d\u016fkaz. Zku\u0161ebn\u00ed verze = reciprocita. Jakmile principy vid\u00ed\u0161, uvid\u00ed\u0161 je v\u0161ude.","dt":"Cialdini t\u0159i roky tajn\u011b pracoval v autobazarech a charit\u00e1ch. Reciprocita: vzorky zdarma zvy\u0161uj\u00ed prodej o 500 %. Soci\u00e1ln\u00ed d\u016fkaz: 75 % host\u016f znovu pou\u017e\u00edv\u00e1 ru\u010dn\u00edky funguje l\u00edp ne\u017e apel na ekologii. Vz\u00e1cnost: pouze 3 kusy skladem dramaticky zvy\u0161uje konverzi. Pozd\u011bji p\u0159idal 7. princip: jednotu (sd\u00edlen\u00e1 identita).","rt":"50s","sv":4567,"xp":20},{"id":"p13","cat":"psy","src":"Stumbling on Happiness","au":"Daniel Gilbert","yr":2006,"ti":"\u0160patn\u011b p\u0159edpov\u00edd\u00e1me \u0161t\u011bst\u00ed","bo":"Pov\u00fd\u0161en\u00ed, o kter\u00e9m sn\u00ed\u0161? Za 3 m\u011bs\u00edce ti bude jedno. Gilbert z Harvardu sledoval lidi po velk\u00fdch zm\u011bn\u00e1ch \u2014 loterie, rozchod, nov\u00e1 pr\u00e1ce \u2014 a zjistil tot\u00e9\u017e: vrac\u00edme se na svou baseline \u0161t\u011bst\u00ed. V\u017edy. Mozek recalibruje nahoru i dol\u016f.","ko":"Gilbert tomu \u0159\u00edk\u00e1 'imunitn\u00ed syst\u00e9m \u0161t\u011bst\u00ed.' Funguje spolehliv\u011b \u2014 ale jen nev\u011bdom\u011b. Proto katastrofizuje\u0161: nev\u00ed\u0161, \u017ee se z toho dostane\u0161.","dt":"Gilbert tento jev naz\u00fdv\u00e1 impact bias \u2014 p\u0159ece\u0148ov\u00e1n\u00ed emo\u010dn\u00edho dopadu budouc\u00edch ud\u00e1lost\u00ed. Lid\u00e9, kte\u0159\u00ed p\u0159i\u0161li o kon\u010detinu, se po roce vr\u00e1t\u00ed na t\u00e9m\u011b\u0159 p\u016fvodn\u00ed \u00farove\u0148 \u0161t\u011bst\u00ed. V\u00fdherci loterie po dvou letech nejsou \u0161\u0165astn\u011bj\u0161\u00ed ne\u017e kontroln\u00ed skupina. Psychologick\u00fd imunitn\u00ed syst\u00e9m funguje l\u00edp u velk\u00fdch ran ne\u017e mal\u00fdch \u2014 velkou trag\u00e9dii zpracujete, ale drobn\u00e9 ka\u017edodenn\u00ed frustrace v\u00e1s \u017eerou.","rt":"40s","sv":2345,"xp":15},{"id":"p14","cat":"psy","src":"V\u00fdzkum pam\u011bti","au":"Hermann Ebbinghaus","yr":1885,"ti":"K\u0159ivka zapom\u00edn\u00e1n\u00ed","bo":"Za hodinu zapomene\u0161 50 % toho, co ses pr\u00e1v\u011b nau\u010dil. Za 24 hodin 70 %. Za t\u00fdden zbude 25 %. Ebbinghaus to zm\u011b\u0159il u\u017e v roce 1885. Ale ka\u017ed\u00e9 opakov\u00e1n\u00ed k\u0159ivku zplo\u0161\u0165uje \u2014 po 4 opakov\u00e1n\u00edch v rostouc\u00edch intervalech si informaci pamatujete roky.","ko":"Z\u00e1klad Anki a spaced repetition. Optim\u00e1ln\u00ed intervaly: 1 den, 3 dny, 7 dn\u016f, 21 dn\u016f. U\u010dte se m\u00e9n\u011b, opakujte chyt\u0159e.","dt":"Ebbinghaus na sob\u011b experimentoval s nesmysln\u00fdmi slabikami. Zjistil, \u017ee zapom\u00edn\u00e1n\u00ed m\u00e1 exponenci\u00e1ln\u00ed k\u0159ivku, ale opakov\u00e1n\u00ed ji zplo\u0161\u0165uje logaritmicky. Modern\u00ed spaced repetition syst\u00e9my (Anki, SuperMemo) na tomto principu stoj\u00ed. Piotr Wozniak vytvo\u0159il algoritmus SM-2, kter\u00fd po\u010d\u00edt\u00e1 optim\u00e1ln\u00ed interval pro ka\u017edou kartu. Kl\u00ed\u010d: u\u010dte se m\u00e9n\u011b, ale opakujte systematicky.","rt":"35s","sv":3890,"xp":15},{"id":"p15","cat":"psy","src":"Soci\u00e1ln\u00ed psychologie","au":"Solomon Asch","yr":1951,"ti":"Konformita","bo":"Odpov\u011b\u010f byla o\u010dividn\u00e1. T\u0159i \u010d\u00e1ry, jedna stejn\u011b dlouh\u00e1. Ale kdy\u017e 7 herc\u016f p\u0159ed tebou zvolilo \u0161patn\u011b, 75 % \u00fa\u010dastn\u00edk\u016f se alespo\u0148 jednou p\u0159idalo. Asch uk\u00e1zal, \u017ee tlak skupiny je tak siln\u00fd, \u017ee zpochybn\u00ed\u0161 vlastn\u00ed vn\u00edm\u00e1n\u00ed reality.","ko":"Ale sta\u010d\u00ed jedin\u00fd spojenec. Kdy\u017e alespo\u0148 jeden \u0159ekl pravdu, konformita klesla o 80 %. Jeden hlas odvahy zm\u011bn\u00ed celou dynamiku.","dt":"Asch zjistil, \u017ee t\u0159etina \u00fa\u010dastn\u00edk\u016f se p\u0159idala opakovan\u011b. V post-experiment\u00e1ln\u00edch rozhovorech mnoz\u00ed \u0159\u00edkali, \u017ee v\u011bd\u011bli, \u017ee odpov\u011b\u010f je \u0161patn\u00e1, ale necht\u011bli vy\u010dn\u00edvat. Modern\u00ed replikace ukazuj\u00ed, \u017ee efekt je siln\u011bj\u0161\u00ed v kolektivistick\u00fdch kultur\u00e1ch (Japonsko, \u010c\u00edna) ne\u017e individualistick\u00fdch (USA, UK). Soci\u00e1ln\u00ed s\u00edt\u011b vytv\u00e1\u0159ej\u00ed permanentn\u00ed Asch\u016fv experiment \u2014 vid\u00edme, co \u0159\u00edkaj\u00ed ostatn\u00ed, d\u0159\u00edv ne\u017e formulujeme vlastn\u00ed n\u00e1zor.","rt":"35s","sv":2678,"xp":15},{"id":"p16","cat":"psy","src":"Pro\u010d zebry nemaj\u00ed v\u0159edy","au":"Robert Sapolsky","yr":2004,"ti":"Chronick\u00fd stres","bo":"Zebra za\u017eije stres p\u0159i \u00fatoku lva \u2014 a pak kon\u010d\u00ed. Ty stresujete t\u00fddny dop\u0159edu kv\u016fli sch\u016fzce s \u0161\u00e9fem. Sapolsky str\u00e1vil 30 let studiem pavi\u00e1n\u016f v Keni a zjistil, \u017ee pod\u0159\u00edzen\u00ed samci m\u011bli vy\u0161\u0161\u00ed kortizol, hor\u0161\u00ed imunitu a v\u00edce ateroskler\u00f3zy. U lid\u00ed: Whitehall Study uk\u00e1zala 3\u00d7 vy\u0161\u0161\u00ed mortalitu u ni\u017e\u0161\u00edch \u00fa\u0159edn\u00edk\u016f.","ko":"\u010c\u00edm m\u00e9n\u011b kontroly nad \u017eivotem m\u00e1\u0161, t\u00edm v\u00edc stresu. Nejde o objem pr\u00e1ce \u2014 jde o autonomii.","dt":"Sapolsky 30 let studoval pavi\u00e1ny v Keni. Zjistil, \u017ee pod\u0159\u00edzen\u00ed samci m\u011bli vy\u0161\u0161\u00ed kortizol, hor\u0161\u00ed imunitu a v\u00edce ateroskler\u00f3zy. U lid\u00ed: Whitehall Study uk\u00e1zala, \u017ee ni\u017e\u0161\u00ed \u00fa\u0159edn\u00edci britsk\u00e9 st\u00e1tn\u00ed spr\u00e1vy m\u011bli 3\u00d7 vy\u0161\u0161\u00ed mortalitu ne\u017e ti na vrcholu \u2014 ne kv\u016fli \u017eivotn\u00edmu stylu, ale kv\u016fli nedostatku kontroly a autonomie.","rt":"45s","sv":1987,"xp":15},{"id":"p17","cat":"psy","src":"Grit","au":"Angela Duckworth","yr":2016,"ti":"Hou\u017eevnatost p\u0159ed\u010d\u00ed talent","bo":"IQ nen\u00ed nejlep\u0161\u00ed prediktor \u00fasp\u011bchu. Ani talent. Duckworth studovala kadety West Pointu, sout\u011b\u017e\u00edc\u00ed v pravopisu a obchodn\u00ed z\u00e1stupce. Ve v\u0161ech p\u0159\u00edpadech vyhr\u00e1la hou\u017eevnatost \u2014 kombinace vytrvalosti a dlouhodob\u00e9 v\u00e1\u0161n\u011b. Talent bez vytrvalosti je nenalad\u011bn\u00fd n\u00e1stroj.","ko":"Grit lze rozv\u00edjet. Kl\u00ed\u010d: najdi, co t\u011b zaj\u00edm\u00e1 \u2014 a pak v tom c\u00edlen\u011b tr\u00e9nuj. Ne opakuj. Tr\u00e9nuj slabiny.","dt":"Duckworth vytvo\u0159ila Grit Scale \u2014 dotazn\u00edk m\u011b\u0159\u00edc\u00ed hou\u017eevnatost. Zjistila, \u017ee grit p\u0159edpov\u00edd\u00e1 \u00fasp\u011bch nad r\u00e1mec IQ, sv\u011bdomitosti i talentu. Kl\u00ed\u010dov\u00fd rozd\u00edl: vytrvalost v jednom sm\u011bru, ne rozpt\u00fdlen\u00e1 aktivita. Lid\u00e9 s vysok\u00fdm gritem m\u011bn\u00ed taktiky, ale ne strategick\u00fd c\u00edl. Anders Ericsson (deliberate practice) dopl\u0148uje: nesta\u010d\u00ed opakovat \u2014 je t\u0159eba c\u00edlen\u011b tr\u00e9novat slabiny na hranici komfortn\u00ed z\u00f3ny.","rt":"40s","sv":3456,"xp":15},{"id":"p18","cat":"psy","src":"Predictably Irrational","au":"Dan Ariely","yr":2008,"ti":"Efekt zdarma","bo":"Bonbon za 1 cent vs. luxusn\u00ed \u010dokol\u00e1da za 15 cent\u016f \u2014 73 % vol\u00ed luxusn\u00ed. Zlevni o 1 cent \u2014 bonbon zdarma, luxusn\u00ed 14 cent\u016f \u2014 a 69 % p\u0159eb\u011bhne k bonbonu. Ariely z MIT dok\u00e1zal, \u017ee slovo 'zdarma' vyp\u00edn\u
