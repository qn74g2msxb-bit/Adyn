.cmp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;animation:fi .5s ease}.cmp .e{font-size:48px;animation:pu 2s infinite}.cmp h2{font-family:var(--fd);font-size:22px;font-weight:700;text-align:center}.cmp p{font-size:14px;color:var(--tm);text-align:center;max-width:260px;line-height:1.5}.brst{margin-top:10px;padding:12px 28px;border-radius:14px;background:linear-gradient(135deg,var(--ac),var(--ad));color:var(--bg);font-family:var(--fm);font-weight:700;font-size:13px}.brst:active{transform:scale(.96)}

.bn{padding:8px 32px calc(12px + var(--sb));display:flex;justify-content:space-around;border-top:1px solid var(--bs);background:var(--bg)}.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 14px;transition:all .2s}.nb .i{font-size:18px;color:var(--tf);transition:color .2s}.nb .l{font-family:var(--fm);font-size:9px;letter-spacing:.8px;color:var(--td);font-weight:500;transition:color .2s}.nb.a .i{color:var(--ac)}.nb.a .l{color:var(--ac);font-weight:700}
.sh{text-align:center;padding:2px 0 4px;font-family:var(--fm);font-size:10px;color:var(--tf);letter-spacing:.5px;animation:fi 1.2s ease}
.vb{display:block;margin:4px auto 2px;background:none;border:1px solid rgba(78,205,196,.3);border-radius:10px;padding:6px 18px;color:var(--ac);font-family:var(--fm);font-size:11px;font-weight:600}
.dtv{flex:1;padding:16px 20px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:fi .4s ease}.dtv .bk{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:12px;color:var(--ac);margin-bottom:14px;padding:6px 0;background:none;border:none;cursor:pointer}.dtv h1{font-family:var(--fd);font-size:26px;font-weight:700;line-height:1.2;margin-bottom:8px}.dtv .mt{font-size:13px;color:#94A3B8;margin-bottom:20px}.dtv .sl2{font-family:var(--fm);font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}.dtv .bt{font-size:16px;line-height:1.75;color:var(--t2);margin-bottom:24px}.dtv .ib{border-radius:14px;padding:14px 16px;margin-bottom:24px}.dtv .db{border-radius:14px;padding:16px 18px;margin-bottom:24px;background:linear-gradient(165deg,var(--c1),var(--c2));border:1px solid var(--bl)}

<script>
var DL=10;
var CATS=[{id:"psy",label:"Psychologie",icon:"\u{1F9E0}",color:"#FF6B6B"},{id:"prod",label:"Produktivita",icon:"\u26A1",color:"#4ECDC4"},{id:"fin",label:"Finance",icon:"\u{1F4B0}",color:"#FFD93D"},{id:"fil",label:"Filosofie",icon:"\u{1F52E}",color:"#A78BFA"},{id:"kom",label:"Komunikace",icon:"\u{1F4AC}",color:"#F472B6"},{id:"zdr",label:"Zdrav\u00ED",icon:"\u{1F33F}",color:"#34D399"}];
var CD=[{"id":"p1","cat":"psy","src":"My\u0161len\u00ed, rychl\u00e9 a pomal\u00e9","au":"Daniel Kahneman","yr":2011,"ti":"Dva syst\u00e9my my\u0161len\u00ed","bo":"Kahneman rozli\u0161uje dva zp\u016fsoby zpracov\u00e1n\u00ed informac\u00ed. Syst\u00e9m 1 je rychl\u00fd a automatick\u00fd \u2014 rozpozn\u00e1te v\u00fdraz obli\u010deje, ani\u017e byste p\u0159em\u00fd\u0161leli. Syst\u00e9m 2 vy\u017eaduje soust\u0159ed\u011bn\u00ed a \u00fasil\u00ed, t\u0159eba p\u0159i po\u010d\u00edt\u00e1n\u00ed 17 \u00d7 24. V\u011bt\u0161inu rozhodov\u00e1n\u00ed \u0159\u00edd\u00ed Syst\u00e9m 1, co\u017e vede k systematick\u00fdm chyb\u00e1m v \u00fasudku.","ko":"Kahneman\u016fv v\u00fdzkum uk\u00e1zal, \u017ee i zku\u0161en\u00ed odborn\u00edci se p\u0159i intuitivn\u00edch rozhodnut\u00edch \u010dasto m\u00fdl\u00ed. U d\u016fle\u017eit\u00fdch rozhodnut\u00ed pom\u00e1h\u00e1 v\u011bdom\u011b zpomalit.","dt":"Kahneman str\u00e1vil des\u00edtky let v\u00fdzkumem s Amosem Tverskym. Spole\u010dn\u011b vytvo\u0159ili Prospect Theory, za kterou Kahneman dostal Nobelovu cenu v roce 2002. Syst\u00e9m 1 zpracov\u00e1v\u00e1 informace paraleln\u011b \u2014 zvl\u00e1dne rozpoznat emoce nebo \u0159\u00eddit auto v pr\u00e1zdn\u00e9 ulici. Syst\u00e9m 2 je s\u00e9riov\u00fd \u2014 aktivuje se p\u0159i slo\u017eit\u00e9m po\u010d\u00edt\u00e1n\u00ed nebo parkov\u00e1n\u00ed. Probl\u00e9m nast\u00e1v\u00e1, kdy\u017e Syst\u00e9m 1 odpov\u00edd\u00e1 na ot\u00e1zky pro Syst\u00e9m 2. Kahneman identifikoval des\u00edtky kognitivn\u00edch zkreslen\u00ed: kotven\u00ed, dostupnostn\u00ed heuristika, efekt r\u00e1mov\u00e1n\u00ed. Praktick\u00fd dopad: p\u0159i d\u016fle\u017eit\u00e9m rozhodnut\u00ed se zeptejte \u2014 odpov\u00edd\u00e1 te\u010f m\u016fj Syst\u00e9m 1 nebo 2?","rt":"45s","sv":2341,"xp":15},{"id":"p2","cat":"psy","src":"Journal of Personality and Social Psychology","au":"Kruger & Dunning","yr":1999,"ti":"Dunning-Kruger\u016fv efekt","bo":"Lid\u00e9 s nejmen\u0161\u00ed \u00farovn\u00ed znalost\u00ed si paradoxn\u011b nejv\u00edc v\u011b\u0159\u00ed. Nekompetentn\u00ed lid\u00e9 nejen d\u011blaj\u00ed \u0161patn\u00e1 rozhodnut\u00ed, ale nav\u00edc jim chyb\u00ed schopnost rozpoznat vlastn\u00ed chyby. Naopak skute\u010dn\u00ed experti sv\u00e9 schopnosti podce\u0148uj\u00ed, proto\u017ee p\u0159edpokl\u00e1daj\u00ed, \u017ee co je snadn\u00e9 pro n\u011b, je snadn\u00e9 pro v\u0161echny.","ko":"\u010c\u00edm v\u00edc toho v\u00edte, t\u00edm v\u00edc si uv\u011bdomujete, co nev\u00edte. P\u0159i naj\u00edm\u00e1n\u00ed lid\u00ed nemus\u00ed b\u00fdt ti nejhlasit\u011bj\u0161\u00ed kandid\u00e1ti ti nejkompetentn\u011bj\u0161\u00ed.","dt":"\u00da\u010dastn\u00edci v doln\u00edm kvartilu odhadovali sv\u016fj v\u00fdkon na 62. percentil \u2014 dramatick\u00e9 nadhodnocen\u00ed. Efekt m\u00e1 dv\u011b \u010d\u00e1sti: nekompetentn\u00ed p\u0159ece\u0148uj\u00ed sebe a nedok\u00e1\u017e\u00ed rozpoznat kompetenci u druh\u00fdch. Po tr\u00e9ninku jejich sebed\u016fv\u011bra paradoxn\u011b klesla \u2014 teprve pak pochopili, co nev\u011bd\u011bli. D\u016fsledky: v medic\u00edn\u011b si pacienti diagnostikuj\u00ed nemoci na internetu, v politice si voli\u010di jsou jisti bez znalost\u00ed, na s\u00edt\u00edch jsou nejhlasit\u011bj\u0161\u00ed koment\u00e1to\u0159i nejm\u00e9n\u011b informovan\u00ed.","rt":"40s","sv":3102,"xp":15},{"id":"p3","cat":"psy","src":"Judgment under Uncertainty","au":"Tversky & Kahneman","yr":1974,"ti":"Efekt kotven\u00ed","bo":"Prvn\u00ed \u010d\u00edslo, kter\u00e9 usly\u0161\u00edte, ovlivn\u00ed v\u00e1\u0161 odhad \u2014 i kdy\u017e s t\u00e9matem nesouvis\u00ed. \u00da\u010dastn\u00edci to\u010dili kolem \u0161t\u011bst\u00ed (10 nebo 65) a odhadovali procento africk\u00fdch zem\u00ed v OSN. Skupina s 65 odhadovala v\u00fdrazn\u011b v\u00fd\u0161. Kotven\u00ed funguje, i kdy\u017e v\u00edte, \u017ee \u010d\u00edslo je n\u00e1hodn\u00e9.","ko":"P\u0159e\u0161krtnut\u00e1 cena 2999 K\u010d a nov\u00e1 999 K\u010d vyu\u017e\u00edv\u00e1 kotven\u00ed. Restaurace maj\u00ed extr\u00e9mn\u011b drah\u00e9 j\u00eddlo v menu ze stejn\u00e9ho d\u016fvodu.","dt":"Soudci v n\u011bmeck\u00e9 studii dostali n\u00e1hodn\u00e9 \u010d\u00edslo a jejich rozsudky s n\u00edm korelovaly. Realitn\u00ed makl\u00e9\u0159i odhadovali cenu domu jinak podle v\u00fdchoz\u00ed ceny. Mechanismus: nedostate\u010dn\u00e9 p\u0159izp\u016fsoben\u00ed od kotvy a selektivn\u00ed aktivace konzistentn\u00edch informac\u00ed v pam\u011bti. Apple p\u0159edstavuje nejdra\u017e\u0161\u00ed iPhone prvn\u00ed \u2014 ukotvuje vn\u00edm\u00e1n\u00ed ceny. P\u0159i vyjedn\u00e1v\u00e1n\u00ed o platu: kdo \u0159ekne \u010d\u00edslo prvn\u00ed, stanov\u00ed kotvu. Obrana: v\u011bdom\u011b zva\u017ete opa\u010dn\u00fd extr\u00e9m.","rt":"40s","sv":1987,"xp":15},{"id":"p4","cat":"psy","src":"A Theory of Cognitive Dissonance","au":"Leon Festinger","yr":1957,"ti":"Kognitivn\u00ed disonance","bo":"Kdy\u017e va\u0161e p\u0159esv\u011bd\u010den\u00ed a jedn\u00e1n\u00ed nejsou v souladu, vznik\u00e1 nep\u0159\u00edjemn\u00e9 vnit\u0159n\u00ed nap\u011bt\u00ed. Festinger studoval sektu v\u011b\u0159\u00edc\u00ed v konec sv\u011bta. Kdy\u017e se proroctv\u00ed nesplnilo, \u010dlenov\u00e9 v\u00edru paradoxn\u011b pos\u00edlili. Mozek preferuje konzistenci a je ochoten p\u0159ekroutit realitu.","ko":"Disonanci \u0159e\u0161\u00edme t\u0159emi zp\u016fsoby: zm\u011bn\u00edme chov\u00e1n\u00ed, zm\u011bn\u00edme p\u0159esv\u011bd\u010den\u00ed, nebo si najdeme v\u00fdmluvu. Nej\u010dast\u011bji bohu\u017eel ta t\u0159et\u00ed varianta.","dt":"Festinger se infiltroval do sekty Dorothy Martinov\u00e9. Kdy\u017e se proroctv\u00ed nesplnilo, \u010dlenov\u00e9 za\u010dali je\u0161t\u011b aktivn\u011bji verbovat. \u010c\u00edm v\u00edc investujete (\u010das, pen\u00edze, vztahy), t\u00edm t\u011b\u017e\u0161\u00ed je p\u0159esv\u011bd\u010den\u00ed opustit. Kupte si drah\u00e9 auto a za\u010dnete vyhled\u00e1vat pozitivn\u00ed recenze. K 00ed v\u00fdsledky, ni\u017e\u0161\u00ed BMI a m\u00e9n\u011b probl\u00e9m\u016f. Mischel zjistil, \u017ee \u00fasp\u011b\u0161n\u00e9 d\u011bti nepou\u017e\u00edvaly s\u00edlu v\u016fle, ale strategie: odvracely pohled, zp\u00edvaly si.","ko":"Pozd\u011bj\u0161\u00ed studie uk\u00e1zaly, \u017ee roli hraje i z\u00e1zem\u00ed \u2014 d\u011bti z nestabiln\u00edho prost\u0159ed\u00ed nemaj\u00ed d\u016fvod \u010dekat, proto\u017ee se nau\u010dily, \u017ee sliby se nepln\u00ed.","dt":"D\u011bti, kter\u00e9 \u010dekaly, m\u011bly o 210 bod\u016f vy\u0161\u0161\u00ed SAT. Sebekontrola nen\u00ed vrozen\u00e1, ale nau\u010diteln\u00e1 dovednost. Replikace (Watts 2018) ale uk\u00e1zala, \u017ee po kontrole socioekonomick\u00e9ho z\u00e1zem\u00ed prediktivn\u00ed s\u00edla klesla. D\u011bti z chud\u0161\u00edch rodin nebyly m\u00e9n\u011b disciplinovan\u00e9 \u2014 nau\u010dily se, \u017ee \u010dek\u00e1n\u00ed se nevypl\u00e1c\u00ed. Sebekontrola z\u00e1vis\u00ed na d\u016fv\u011b\u0159e v syst\u00e9m.","rt":"45s","sv":4201,"xp":15},{"id":"p7","cat":"psy","src":"Soci\u00e1ln\u00ed psychologie","au":"Edward Thorndike","yr":1920,"ti":"Hal\u00f3 efekt","bo":"Prvn\u00ed dojem ovlivn\u00ed v\u0161echna dal\u0161\u00ed hodnocen\u00ed. D\u016fstojn\u00edci hodnot\u00edc\u00ed voj\u00e1ky jako atraktivn\u00ed jim p\u0159isuzovali lep\u0161\u00ed inteligenci. Funguje i obr\u00e1cen\u011b: jedna negativn\u00ed vlastnost zast\u00edn\u00ed pozitivn\u00ed. Vy\u0161\u0161\u00ed lid\u00e9 jsou vn\u00edm\u00e1ni jako kompetentn\u011bj\u0161\u00ed, atraktivn\u00ed dost\u00e1vaj\u00ed m\u00edrn\u011bj\u0161\u00ed tresty u soudu.","ko":"Na pohovorech rozhoduje prvn\u00edch 7 sekund. Knihu si vyb\u00edr\u00e1me podle ob\u00e1lky. V\u011bdom\u00ed hal\u00f3 efektu je prvn\u00ed krok k objektivit\u011b.","dt":"Atraktivn\u00ed lid\u00e9 vyd\u011bl\u00e1vaj\u00ed o 10\u201315 % v\u00edc. Vy\u0161\u0161\u00ed prezidentsk\u00fd kandid\u00e1t vyhr\u00e1v\u00e1 v\u011bt\u0161inu americk\u00fdch voleb. \u00ed n\u00e1pad. Skute\u010dn\u00e9 pravidlo bylo jednoduch\u00e9: t\u0159i rostouc\u00ed \u010d\u00edsla.","ko":"Na soci\u00e1ln\u00edch s\u00edt\u00edch algoritmy potvrzovac\u00ed zkreslen\u00ed n\u00e1sobn\u011b zesiluj\u00ed a vytv\u00e1\u0159ej\u00ed informa\u010dn\u00ed bubliny.","dt":"Wason dal \u0159adu 2, 4, 6. T\u00e9m\u011b\u0159 v\u0161ichni testovali jen sud\u00e1 rostouc\u00ed \u010d\u00edsla. Sta\u010dilo zkusit 1, 5, 9. Potvrzovac\u00ed zkreslen\u00ed je j\u00e1dro politick\u00e9 polarizace, konspira\u010dn\u00edch teori\u00ed i \u0161patn\u00fdch obchodn\u00edch rozhodnut\u00ed. V medic\u00edn\u011b l\u00e9ka\u0159i s prvotn\u00ed diagn\u00f3zou podv\u011bdom\u011b hledaj\u00ed potvrzuj\u00edc\u00ed p\u0159\u00edznaky. Obrana: aktivn\u011b hledejte d\u016fkazy PROTI sv\u00e9mu p\u0159esv\u011bd\u010den\u00ed.","rt":"40s","sv":2134,"xp":15},{"id":"p10","cat":"psy","src":"Bystander Effect Study","au":"Darley & Latan\u00e9","yr":1968,"ti":"Efekt p\u0159ihl\u00ed\u017eej\u00edc\u00edho","bo":"\u010c\u00edm v\u00edc sv\u011bdk\u016f nehody, t\u00edm m\u00e9n\u011b pravd\u011bpodobn\u00e9, \u017ee n\u011bkdo pom\u016f\u017ee. S\u00e1m: 85 % pom\u016f\u017ee. Ve skupin\u011b p\u011bti: 31 %. Ka\u017ed\u00fd \u010dek\u00e1 na druh\u00e9ho. Experiment provedli po vra\u017ed\u011b Kitty Genovese v New Yorku.","ko":"Pot\u0159ebujete-li pomoc, uka\u017ete na konkr\u00e9tn\u00edho \u010dlov\u011bka: vy v modr\u00e9 bund\u011b, zavolejte z\u00e1chranku! Rozbijete rozptyl odpov\u011bdnosti.","dt":"T\u0159i mechanismy: rozptyl odpov\u011bdnosti, pluralitn\u00ed ignorance (nikdo nereaguje = asi to nen\u00ed v\u00e1\u017en\u00e9) a evalua\u010dn\u00ed obava (boj\u00edme se vypadat hloup\u011b). Na pracovi\u0161ti: email cel\u00e9mu t\u00fdmu = nikdo nezareaguje. Email jednomu \u010dlov\u011bku = reakce p\u0159ijde. Na ulici funguje adresn\u00e1 prosba 10\u00d7 l\u00e9p ne\u017e obecn\u00e9 vol\u00e1n\u00ed o pomoc.","rt":"40s","sv":3421,"xp":15},{"id":"p11","cat":"psy","src":"Tok","au":"Mihaly Csikszentmihalyi","yr":1990,"ti":"Stav flow","bo":"Flow nast\u00e1v\u00e1 p\u0159i rovnov\u00e1ze mezi obt\u00ed\u017enost\u00ed a dovednost\u00ed. Ztr\u00e1c\u00edte pojem o \u010dase a pod\u00e1v\u00e1te nejlep\u0161\u00ed v\u00fdkon. Csikszentmihalyi to popsal na z\u00e1klad\u011b tis\u00edc\u016f rozhovor\u016f \u2014 od chirurg\u016f po horolezce. V\u0161ichni popisovali stejn\u00e9: \u00fapln\u00e9 pohlcen\u00ed, zmizen\u00ed kritika, jin\u00fd \u010das.","ko":"Flow se nej\u010dast\u011bji objevuje s jasn\u00fdm c\u00edlem, okam\u017eitou zp\u011btnou vazbou a n\u00e1ro\u010dnost\u00ed m\u00edrn\u011b p\u0159esahuj\u00edc\u00ed schopnosti.","dt":"8 charakteristik flow: jasn\u00e9 c\u00edle, okam\u017eit\u00e1 zp\u011btn\u00e1 vazba, rovnov\u00e1ha v\u00fdzvy a dovednosti, slou\u010den\u00ed akce a v\u011bdom\u00ed, ztr\u00e1ta sebeuv\u011bdom\u011bn\u00ed, zkreslen\u00ed \u010dasu, pocit kontroly, vnit\u0159n\u00ed motivace. V\u00fdzva by m\u011bla p\u0159esahovat schopnosti asi o 4 %. P\u0159\u00edli\u0161 snadn\u00e9 = nuda. P\u0159\u00edli\u0161 t\u011b\u017ek\u00e9 = \u00fazkost. Google a Valve designuj\u00ed pracovn\u00ed prost\u0159ed\u00ed pro flow.","rt":"40s","sv":1876,"xp":15},{"id":"p12","cat":"psy","src":"Influence","au":"Robert Cialdini","yr":1984,"ti":"6 princip\u016f p\u0159esv\u011bd\u010dov\u00e1n\u00ed","bo":"\u0160est univerz\u00e1ln\u00edch princip\u016f: reciprocita (oplat\u00edte laskavost), z\u00e1vazek (ano mal\u00fdm v\u011bcem \u2192 t\u011b\u017eko ne velk\u00fdm), soci\u00e1ln\u00ed d\u016fkaz (d\u011bl\u00e1me co ostatn\u00ed), autorita (poslechneme experty), obliba (ano lidem, kter\u00e9 m\u00e1me r\u00e1di), vz\u00e1cnost (chceme to, \u010deho je m\u00e1lo).","ko":"Limitovan\u00e9 edice = vz\u00e1cnost. Recenze = soci\u00e1ln\u00ed d\u016fkaz. Zku\u0161ebn\u00ed verze zdarma = reciprocita.","dt":"Cialdini t\u0159i roky tajn\u011b pracoval v autobazarech a charit\u00e1ch. Reciprocita: vzorky zdarma zvy\u0161uj\u00ed prodej o 500 %. Soci\u00e1ln\u00ed d\u016fkaz: 75 % host\u016f znovu pou\u017e\u00edv\u00e1 ru\u010dn\u00edky funguje l\u00edp ne\u017e apel na ekologii. Vz\u00e1cnost: pouze 3 kusy skladem dramaticky zvy\u0161uje konverzi. Pozd\u011bji p\u0159idal 7. princip: jednotu (sd\u00edlen\u00e1 identita).","rt":"50s","sv":4567,"xp":20},{"id":"p13","cat":"psy","src":"Stumbling on Happiness","au":"Daniel Gilbert","yr":2006,"ti":"\u0160patn\u011b p\u0159edpov\u00edd\u00e1me \u0161t\u011bst\u00ed","bo":"Lid\u00e9 jsou extr\u00e9mn\u011b \u0161patn\u00ed v p\u0159edpov\u00edd\u00e1n\u00ed \u0161t\u011bst\u00ed. P\u0159ece\u0148ujeme intenzitu i d\u00e9lku emoc\u00ed. V\u00fdhra v loterii nezm\u011bn\u00ed \u017eivot nav\u017edy. Invalidita nebude nesnesiteln\u00e1 \u2014 adaptujeme se. Mozek m\u00e1 psychologick\u00fd imunitn\u00ed syst\u00e9m, kter\u00fd negativn\u00ed ud\u00e1losti neutralizuje rychleji, ne\u017e \u010dek\u00e1me.","ko":"Gilbert doporu\u010duje m\u00edsto fantaz\u00edrov\u00e1n\u00ed pozorovat lidi, kte\u0159\u00ed dan\u00fd z\u00e1\u017eitek u\u017e maj\u00ed. Jejich aktu\u00e1ln\u00ed \u0161t\u011bst\u00ed je lep\u0161\u00ed prediktor.","dt":"Gilbert tento jev naz\u00fdv\u00e1 impact bias \u2014 p\u0159ece\u0148ov\u00e1n\u00ed emo\u010dn\u00edho dopadu budouc\u00edch ud\u00e1lost\u00ed. Lid\u00e9, kte\u0159\u00ed p\u0159i\u0161li o kon\u010detinu, se po roce vr\u00e1t\u00ed na t\u00e9m\u011b\u0159 p\u016fvodn\u00ed \u00farove\u0148 \u0161t\u011bst\u00ed. V\u00fdherci loterie po dvou letech nejsou \u0161\u0165astn\u011bj\u0161\u00ed ne\u017e kontroln\u00ed skupina. Psychologick\u00fd imunitn\u00ed syst\u00e9m funguje l\u00edp u velk\u00fdch ran ne\u017e mal\u00fdch \u2014 velkou trag\u00e9dii zpracujete, ale drobn\u00e9 ka\u017edodenn\u00ed frustrace v\u00e1s \u017eerou.","rt":"40s","sv":2345,"xp":15},{"id":"p14","cat":"psy","src":"V\u00fdzkum pam\u011bti","au":"Hermann Ebbinghaus","yr":1885,"ti":"K\u0159ivka zapom\u00edn\u00e1n\u00ed","bo":"Bez opakov\u00e1n\u00ed ztr\u00e1c\u00edme 50 % nau\u010den\u00e9ho za hodinu, 70 % za 24 hodin. Po t\u00fddnu z\u016fstane 25 %. Ale ka\u017ed\u00e9 opakov\u00e1n\u00ed k\u0159ivku zplo\u0161\u0165uje \u2014 po \u010dty\u0159ech opakov\u00e1n\u00edch v rostouc\u00edch intervalech si informaci pamatujete m\u011bs\u00edce a\u017e roky.","ko":"Z\u00e1klad spaced repetition \u2014 metody aplikac\u00ed jako Anki. Nejefektivn\u011bj\u0161\u00ed intervaly: 1 den, 3 dny, 7 dn\u016f, 21 dn\u016f.","dt":"Ebbinghaus na sob\u011b experimentoval s nesmysln\u00fdmi slabikami. Zjistil, \u017ee zapom\u00edn\u00e1n\u00ed m\u00e1 exponenci\u00e1ln\u00ed k\u0159ivku, ale opakov\u00e1n\u00ed ji zplo\u0161\u0165uje logaritmicky. Modern\u00ed spaced repetition syst\u00e9my (Anki, SuperMemo) na tomto principu stoj\u00ed. Piotr Wozniak vytvo\u0159il algoritmus SM-2, kter\u00fd po\u010d\u00edt\u00e1 optim\u00e1ln\u00ed interval pro ka\u017edou kartu. Kl\u00ed\u010d: u\u010dte se m\u00e9n\u011b, ale opakujte systematicky.","rt":"35s","sv":3890,"xp":15},{"id":"p15","cat":"psy","src":"Soci\u00e1ln\u00ed psychologie","au":"Solomon Asch","yr":1951,"ti":"Konformita","bo":"Asch uk\u00e1zal \u010d\u00e1ru a po\u017e\u00e1dal skupinu, kter\u00e1 je stejn\u011b dlouh\u00e1. Odpov\u011b\u010f byla o\u010dividn\u00e1, ale kdy\u017e herci volili \u0161patn\u011b, 75 % se alespo\u0148 jednou p\u0159idalo. Tlak skupiny zpochybn\u00ed vlastn\u00ed vn\u00edm\u00e1n\u00ed reality.","ko":"Sta\u010d\u00ed jedin\u00fd spojenec. Kdy\u017e alespo\u0148 jeden \u0159ekl pravdu, konformita klesla o 80 %. Jeden hlas odvahy zm\u011bn\u00ed celou dynamiku.","dt":"Asch zjistil, \u017ee t\u0159etina \u00fa\u010dastn\u00edk\u016f se p\u0159idala opakovan\u011b. V post-experiment\u00e1ln\u00edch rozhovorech mnoz\u00ed \u0159\u00edkali, \u017ee v\u011bd\u011bli, \u017ee odpov\u011b\u010f je \u0161patn\u00e1, ale necht\u011bli vy\u010dn\u00edvat. Modern\u00ed replikace ukazuj\u00ed, \u017ee efekt je siln\u011bj\u0161\u00ed v 6f\u017ee st\u00e1t. Ne proto, abyste se b\u00e1li, ale proto, abyste byli p\u0159ipraveni a vd\u011b\u010dn\u00ed za to, co m\u00e1te.","rt":"40s","sv":3890,"xp":20},{"id":"fi2","cat":"fil","src":"Radostn\u00e1 v\u011bda","au":"Friedrich Nietzsche","yr":1882,"ti":"Amor fati","bo":"Milujte sv\u016fj osud \u2014 v\u010detn\u011b utrpen\u00ed. Ka\u017ed\u00e1 bolest a ne\u00fasp\u011bch je sou\u010d\u00e1st\u00ed cesty, kter\u00e1 v\u00e1s formovala. Odm\u00edtat \u010d\u00e1sti sv\u00e9ho \u017eivota = odm\u00edtat sebe sama. Nietzsche to spojoval s v\u011b\u010dn\u00fdm n\u00e1vratem: \u017eili byste \u017eivot stejn\u011b, kdyby se opakoval donekone\u010dna?","ko":"Amor fati neznamen\u00e1 pasivitu. Znamen\u00e1 p\u0159estat bojovat s minulost\u00ed a zam\u011b\u0159it energii na p\u0159\u00edtomnost.","dt":"","rt":"40s","sv":2345,"xp":15},{"id":"fi3","cat":"fil","src":"Stoick\u00e1 filosofie","au":"Stoicismus","yr":-300,"ti":"Memento mori","bo":"V\u011bdom\u00ed smrtelnosti je osvobozuj\u00edc\u00ed. Stoikov\u00e9 doporu\u010dovali denn\u011b p\u0159ipom\u00ednat si kone\u010dnost \u017eivota. Ne proto, abyste se b\u00e1li, ale proto, abyste p\u0159estali odkl\u00e1dat to, na \u010dem z\u00e1le\u017e\u00ed. Jobs: v\u011bdom\u00ed smrti je nejlep\u0161\u00ed n\u00e1stroj proti strachu z ne\u00fasp\u011bchu.","ko":"Seneca: nen\u00ed m\u00e1lo \u010dasu, kter\u00fd m\u00e1me, ale hodn\u011b \u010dasu, kter\u00fd promarn\u00edme. Memento mori je o tom, jak \u017e\u00edt.","dt":"Seneca ve sv\u00fdch Dopisech Luciliovi psal: p\u0159edstav si, \u017ee dnes je tv\u016fj posledn\u00ed den. Ne se strachem, ale s nal\u00e9havost\u00ed \u2014 co bys ud\u011blal jinak? Modern\u00ed ekvivalent: Bezos\u016fv regret minimization framework \u2014 p\u0159edstavte si sebe v 80 letech. Budete litovat, \u017ee jste to nezkusili? Pokud ano, ud\u011blejte to. Bronnie Ware, zdravotn\u00ed sestra, sepsala 5 nej\u010dast\u011bj\u0161\u00edch l\u00edtost\u00ed um\u00edraj\u00edc\u00edch \u2014 \u010d\u00edslo 1: p\u0159\u00e1l bych si, abych \u017eil \u017eivot v\u011brn\u00fd sob\u011b, ne \u017eivot, kter\u00fd ode m\u011b ostatn\u00ed o\u010dek\u00e1vali.","rt":"40s","sv":4567,"xp":20},{"id":"fi4","cat":"fil","src":"M\u00fdtus o Sisyfovi","au":"Albert Camus","yr":1942,"ti":"Absurdn\u00ed hrdina","bo":"Sisyfos val\u00ed balvan do kopce, ten se skut\u00e1l\u00ed dol\u016f, a Sisyfos za\u010dne znovu. Camus tvrd\u00ed, \u017ee v tomto opakov\u00e1n\u00ed m\u016f\u017eeme naj\u00edt smysl. \u017divot nem\u00e1 p\u0159edem dan\u00fd v\u00fdznam, ale to neznamen\u00e1, \u017ee je bezcenn\u00fd. Smysl vytv\u00e1\u0159\u00edme my sami, v procesu, v boji.","ko":"Camus kon\u010d\u00ed: mus\u00edme si p\u0159edstavit Sisyfa \u0161\u0165astn\u00e9ho. Smysl nen\u00ed c\u00edl \u2014 je to cesta. \u017divot nem\u00e1 b\u00fdt vysv\u011btlen\u00fd, ale pro\u017eit\u00fd.","dt":"","rt":"45s","sv":3210,"xp":20},{"id":"fi5","cat":"fil","src":"\u00dastava (Politeia)","au":"Plat\u00f3n","yr":-380,"ti":"Jeskyn\u011b","bo":"Lid\u00e9 sed\u00ed v jeskyni a vid\u00ed jen st\u00edny na st\u011bn\u011b. Pova\u017euj\u00ed je za realitu. Kdy\u017e se jeden oto\u010d\u00ed a uvid\u00ed skute\u010dn\u00e9 sv\u011btlo, ostatn\u00ed mu nev\u011b\u0159\u00ed. Plat\u00f3n popisuje, jak t\u011b\u017ek\u00e9 je opustit omezen\u00e9 vn\u00edm\u00e1n\u00ed \u2014 a jak nepopul\u00e1rn\u00ed je \u0159\u00edkat pravdu.","ko":"V digit\u00e1ln\u00ed dob\u011b je Plat\u00f3nova jeskyn\u011b relevantn\u011bj\u0161\u00ed ne\u017e d\u0159\u00edve \u2014 soci\u00e1ln\u00ed bubliny a algoritmy vytv\u00e1\u0159ej\u00ed modern\u00ed st\u00edny.","dt":"","rt":"40s","sv":5678,"xp":20},{"id":"fi6","cat":"fil","src":"Z\u00e1klady metafyziky mrav\u016f","au":"Immanuel Kant","yr":1785,"ti":"Kategorick\u00fd imperativ","bo":"Jednej podle z\u00e1sady, o kter\u00e9 bys cht\u011bl, aby se stala obecn\u00fdm z\u00e1konem. Pokud je lhan\u00ed \u0161patn\u00e9, je \u0161patn\u00e9 v\u017edy \u2014 bez v\u00fd
